<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage — Service History</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --black:#0a0a0a;--dark:#111111;--panel:#161616;--border:#242424;
    --accent:#c8a96e;--accent-dim:rgba(200,169,110,0.15);--accent-glow:rgba(200,169,110,0.05);
    --red:#e05555;--green:#5dba7d;--blue:#5b9bd5;--muted:#555;
    --text:#d8d0c4;--text-dim:#888;--white:#f0ece4;
    --sierra-accent:#5b9bd5;--sierra-dim:rgba(91,155,213,0.15);--sierra-glow:rgba(91,155,213,0.05);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}
  .vehicle-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:100;}
  .vtab{display:flex;align-items:center;gap:12px;padding:16px 32px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s ease;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);user-select:none;}
  .vtab:hover{color:var(--text);background:rgba(255,255,255,0.02);}
  .vtab.active-cayman{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-glow);}
  .vtab.active-sierra{color:var(--sierra-accent);border-bottom-color:var(--sierra-accent);background:var(--sierra-glow);}
  .vtab-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid;}
  .vtab-badge-cayman{color:var(--accent);border-color:rgba(200,169,110,0.3);background:var(--accent-dim);}
  .vtab-badge-sierra{color:var(--sierra-accent);border-color:rgba(91,155,213,0.3);background:var(--sierra-dim);}
  .garage-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;padding:16px 24px;border-right:1px solid var(--border);display:flex;align-items:center;}
  .vehicle-panel{display:none;} .vehicle-panel.active{display:block;}
  header{border-bottom:1px solid var(--border);padding:40px 64px 36px;position:relative;overflow:hidden;}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;opacity:0.4;}
  header.cayman-header::after{background:linear-gradient(90deg,transparent,var(--accent),transparent);}
  header.sierra-header::after{background:linear-gradient(90deg,transparent,var(--sierra-accent),transparent);}
  .header-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:12px;}
  .header-eyebrow.cayman{color:var(--accent);} .header-eyebrow.sierra{color:var(--sierra-accent);}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,88px);letter-spacing:0.04em;line-height:0.9;color:var(--white);}
  header h1 span.cayman-accent{color:var(--accent);} header h1 span.sierra-accent{color:var(--sierra-accent);}
  .header-meta{display:flex;gap:40px;margin-top:24px;flex-wrap:wrap;}
  .meta-item{display:flex;flex-direction:column;gap:4px;}
  .meta-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;}
  .meta-value{font-family:'DM Mono',monospace;font-size:14px;color:var(--text);}
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);}
  .stat{padding:28px 40px;border-right:1px solid var(--border);transition:background 0.3s ease;}
  .stat:last-child{border-right:none;}
  .stat.cayman:hover{background:var(--accent-glow);} .stat.sierra:hover{background:var(--sierra-glow);}
  .stat-number{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;margin-bottom:6px;}
  .stat-number.cayman{color:var(--accent);} .stat-number.sierra{color:var(--sierra-accent);}
  .stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;}
  .charts-band{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
  .chart-pane{padding:24px 36px 20px;border-right:1px solid var(--border);}
  .chart-pane:last-child{border-right:none;}
  .chart-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
  .chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .legend-item{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);}
  .legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .main{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 400px);}
  .sidebar{border-right:1px solid var(--border);padding:36px 0;position:sticky;top:53px;height:fit-content;}
  .sidebar-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;padding:0 28px 18px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 28px;cursor:pointer;transition:all 0.2s ease;border-left:2px solid transparent;}
  .nav-item:hover{background:var(--accent-glow);border-left-color:var(--accent);}
  .nav-item.active{border-left-color:var(--accent);background:var(--accent-glow);}
  .nav-item.active .nav-label{color:var(--accent);}
  .nav-item.sierra-nav:hover{background:var(--sierra-glow);border-left-color:var(--sierra-accent);}
  .nav-item.sierra-nav.active{border-left-color:var(--sierra-accent);background:var(--sierra-glow);}
  .nav-item.sierra-nav.active .nav-label{color:var(--sierra-accent);}
  .nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .nav-label{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-dim);transition:color 0.2s;}
  .nav-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:2px 7px;border-radius:20px;}
  .content{padding:40px 52px;}
  .section{display:none;} .section.visible{display:block;animation:fadeIn 0.25s ease;}
  .section-header{display:flex;align-items:baseline;gap:16px;margin-bottom:32px;padding-bottom:18px;border-bottom:1px solid var(--border);}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--white);letter-spacing:0.05em;}
  .section-subtitle{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:0.15em;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:22px;transition:all 0.25s ease;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
  .card.routine::before{background:#5b9bd5;} .card.engine::before{background:#e08c55;}
  .card.brake::before{background:#5dba7d;} .card.cooling::before{background:#c86e9a;}
  .card.electrical::before{background:#e0d055;} .card.major::before{background:var(--red);}
  .card.transmission::before{background:#a78bfa;} .card.fuel::before{background:#fb923c;}
  .card-date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
  .card-title{font-size:14px;font-weight:500;color:var(--white);margin-bottom:6px;line-height:1.4;}
  .card-shop{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:12px;}
  .card-odo{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:2px;margin-top:10px;}
  .card-odo.cayman{color:var(--accent);background:var(--accent-dim);}
  .card-odo.cayman::before{content:'◈';font-size:8px;}
  .card-odo.sierra{color:var(--sierra-accent);background:var(--sierra-dim);}
  .card-odo.sierra::before{content:'◈';font-size:8px;}
  .alert-card{background:rgba(224,85,85,0.05);border:1px solid rgba(224,85,85,0.25);border-radius:2px;padding:18px 22px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px;}
  .alert-card.info{background:rgba(91,155,213,0.05);border-color:rgba(91,155,213,0.25);}
  .alert-card.cooling{background:rgba(200,110,154,0.05);border-color:rgba(200,110,154,0.25);}
  .alert-icon{font-size:17px;flex-shrink:0;margin-top:2px;}
  .alert-text h4{font-size:13px;font-weight:500;margin-bottom:4px;}
  .alert-text h4.danger{color:var(--red);} .alert-text h4.info{color:var(--sierra-accent);} .alert-text h4.cooling{color:#c86e9a;}
  .alert-text p{font-size:12px;color:var(--text-dim);line-height:1.6;}
  .timeline{position:relative;padding-left:30px;}
  .timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;}
  .timeline.cayman-tl::before{background:linear-gradient(180deg,var(--accent) 0%,var(--border) 40%);}
  .timeline.sierra-tl::before{background:linear-gradient(180deg,var(--sierra-accent) 0%,var(--border) 40%);}
  .timeline-item{position:relative;margin-bottom:24px;animation:fadeLeft 0.4s ease forwards;opacity:0;}
  .timeline-item:nth-child(1){animation-delay:0.04s} .timeline-item:nth-child(2){animation-delay:0.08s}
  .timeline-item:nth-child(3){animation-delay:0.12s} .timeline-item:nth-child(4){animation-delay:0.16s}
  .timeline-item:nth-child(5){animation-delay:0.20s} .timeline-item:nth-child(6){animation-delay:0.24s}
  .timeline-item:nth-child(7){animation-delay:0.28s} .timeline-item:nth-child(8){animation-delay:0.32s}
  .timeline-item:nth-child(9){animation-delay:0.36s} .timeline-item:nth-child(10){animation-delay:0.40s}
  .timeline-dot{position:absolute;left:-26px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--black);}
  .timeline-dot.cayman{background:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
  .timeline-dot.sierra{background:var(--sierra-accent);box-shadow:0 0 0 3px var(--sierra-dim);}
  .timeline-dot.dot-major{width:15px;height:15px;left:-27px;}
  .timeline-dot.cayman.dot-major{box-shadow:0 0 0 4px var(--accent-dim),0 0 12px rgba(200,169,110,0.3);}
  .timeline-dot.dot-minor{background:var(--panel);border-color:var(--border);box-shadow:none;width:10px;height:10px;left:-24px;}
  .tl-date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:5px;}
  .tl-date.cayman{color:var(--accent);} .tl-date.sierra{color:var(--sierra-accent);}
  .tl-title{font-size:14px;font-weight:500;color:var(--white);margin-bottom:3px;}
  .tl-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}
  .tl-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .timeline-item.search-hit{border-left:2px solid var(--accent);padding-left:10px;margin-left:-12px;border-radius:2px;animation:searchPulse 2s ease forwards;}
  .timeline-item.search-hit.sierra-hit{border-left-color:var(--sierra-accent);animation:searchPulseSierra 2s ease forwards;}
  @keyframes searchPulse{0%{background:rgba(200,169,110,0.18);}60%{background:rgba(200,169,110,0.10);}100%{background:transparent;}}
  @keyframes searchPulseSierra{0%{background:rgba(91,155,213,0.18);}60%{background:rgba(91,155,213,0.10);}100%{background:transparent;}}
  .tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 7px;border-radius:2px;border:1px solid;}
  .tag-engine{color:#e08c55;border-color:rgba(224,140,85,0.3);background:rgba(224,140,85,0.07);}
  .tag-brake{color:#5dba7d;border-color:rgba(93,186,125,0.3);background:rgba(93,186,125,0.07);}
  .tag-routine{color:#5b9bd5;border-color:rgba(91,155,213,0.3);background:rgba(91,155,213,0.07);}
  .tag-cooling{color:#c86e9a;border-color:rgba(200,110,154,0.3);background:rgba(200,110,154,0.07);}
  .tag-electrical{color:#e0d055;border-color:rgba(224,208,85,0.3);background:rgba(224,208,85,0.07);}
  .tag-major{color:var(--red);border-color:rgba(224,85,85,0.3);background:rgba(224,85,85,0.07);}
  .tag-turbo{color:var(--accent);border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.07);}
  .tag-transmission{color:#a78bfa;border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.07);}
  .tag-fuel{color:#fb923c;border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.07);}
  .tag-tires{color:#8b8b8b;border-color:rgba(139,139,139,0.3);background:rgba(139,139,139,0.07);}
  .tag-inspection{color:#5b9bd5;border-color:rgba(91,155,213,0.3);background:rgba(91,155,213,0.07);}
  .tag-accessories{color:#8b8b8b;border-color:rgba(139,139,139,0.3);background:rgba(139,139,139,0.07);}
  .mileage-section{margin-bottom:36px;}
  .mile-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:20px;}
  .mile-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .mile-row-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:72px;}
  .mile-track{position:relative;height:4px;background:var(--border);border-radius:2px;flex:1;}
  .mile-fill{height:100%;border-radius:2px;}
  .mile-fill.cayman{background:linear-gradient(90deg,#5b9bd5,var(--accent));}
  .mile-fill.sierra{background:linear-gradient(90deg,#2563a8,var(--sierra-accent));}
  .mile-row-value{font-family:'DM Mono',monospace;font-size:11px;width:58px;text-align:right;}
  .mile-row-value.cayman{color:var(--accent);} .mile-row-value.sierra{color:var(--sierra-accent);}
  .mile-row-value.dim{color:var(--text-dim);}
  .ownership-badge{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);padding:9px 14px;border-radius:2px;margin-top:16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}
  .ownership-badge span.cayman{color:var(--accent);} .ownership-badge span.sierra{color:var(--sierra-accent);}
  .shop-table{width:100%;border-collapse:collapse;}
  .shop-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);}
  .shop-table td{font-size:13px;padding:13px 14px;border-bottom:1px solid rgba(36,36,36,0.5);vertical-align:top;}
  .shop-table tr:last-child td{border-bottom:none;}
  .shop-table tr:hover td{background:var(--accent-glow);}
  .shop-name{font-weight:500;color:var(--white);font-size:13px;}
  .shop-visits{font-family:'DM Mono',monospace;font-size:20px;}
  .shop-visits.cayman{color:var(--accent);} .shop-visits.sierra{color:var(--sierra-accent);}
  .shop-era{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}
  .search-wrap{margin-left:auto;display:flex;align-items:center;padding:0 20px;border-left:1px solid var(--border);}
  .search-input-wrap{position:relative;display:flex;align-items:center;}
  .search-icon{position:absolute;left:10px;color:var(--muted);font-size:13px;pointer-events:none;}
  #search-input{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:7px 28px 7px 30px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);width:210px;outline:none;transition:border-color 0.2s,width 0.3s ease;}
  #search-input::placeholder{color:var(--muted);}
  #search-input:focus{border-color:var(--accent);width:270px;}
  .search-clear{position:absolute;right:8px;cursor:pointer;color:var(--muted);font-size:15px;display:none;line-height:1;transition:color 0.2s;}
  .search-clear:hover{color:var(--text);}
  #search-results{display:none;position:absolute;top:53px;left:0;right:0;background:var(--dark);border-bottom:2px solid var(--border);z-index:98;max-height:72vh;overflow-y:auto;animation:fadeIn 0.15s ease;}
  .sr-header{display:flex;justify-content:space-between;align-items:center;padding:12px 32px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;position:sticky;top:0;background:var(--dark);z-index:1;}
  .sr-count{color:var(--accent);}
  .sr-item{display:flex;align-items:flex-start;gap:14px;padding:13px 32px;border-bottom:1px solid rgba(36,36,36,0.6);cursor:pointer;transition:background 0.12s;}
  .sr-item:hover{background:var(--panel);}
  .sr-item:last-child{border-bottom:none;}
  .sr-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid;flex-shrink:0;margin-top:2px;white-space:nowrap;}
  .sr-badge.cayman{color:var(--accent);border-color:rgba(200,169,110,0.35);background:var(--accent-dim);}
  .sr-badge.sierra{color:var(--sierra-accent);border-color:rgba(91,155,213,0.35);background:var(--sierra-dim);}
  .sr-body{flex:1;min-width:0;}
  .sr-title{font-size:13px;font-weight:500;color:var(--white);margin-bottom:3px;line-height:1.4;}
  .sr-title mark{background:rgba(200,169,110,0.2);color:var(--accent);border-radius:2px;padding:0 2px;}
  .sr-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
  .sr-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .sr-empty{padding:48px 32px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.1em;}
  .header-img-wrap{position:relative;max-width:580px;margin-bottom:18px;overflow:hidden;border-radius:2px;}
  .header-img-wrap img{width:100%;display:block;mix-blend-mode:luminosity;filter:contrast(1.1) brightness(0.85) saturate(0.7);}
  .header-img-wrap .overlay-r{position:absolute;inset:0;background:linear-gradient(to right,transparent 30%,#0a0a0a 98%);pointer-events:none;}
  .header-img-wrap .overlay-tb{position:absolute;inset:0;background:linear-gradient(to bottom,#0a0a0a 0%,transparent 18%,transparent 72%,#0a0a0a 100%);pointer-events:none;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeLeft{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
  @media(max-width:900px){
    header{padding:28px 24px;}
    .stats-bar{grid-template-columns:repeat(2,1fr);}
    .charts-band{grid-template-columns:1fr;}
    .chart-pane{border-right:none;border-bottom:1px solid var(--border);}
    .main{grid-template-columns:1fr;}
    .sidebar{position:static;border-right:none;border-bottom:1px solid var(--border);padding:20px 0;}
    .content{padding:28px 20px;}
    .garage-label{display:none;}
    .search-wrap{padding:10px 16px;border-left:none;border-top:1px solid var(--border);width:100%;}
    #search-input,#search-input:focus{width:100%;}
  }
</style>
</head>

<!-- All garage data lives in data.json — edit that file to add/update records -->
<script>
// Fetch data.json, then kick off the render engine
let GARAGE_DATA = null;

async function loadData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    GARAGE_DATA = await res.json();
    initApp();
  } catch(err) {
    document.body.innerHTML = '<div style="padding:60px;font-family:monospace;color:#e05555;">' +
      '<h2>Could not load data.json</h2>' +
      '<p style="margin-top:12px;color:#888;">' + err.message + '</p>' +
      '<p style="margin-top:8px;color:#888;">If opening this file directly from disk (file://), ' +
      'use a local server instead: <code>npx serve .</code> then open localhost:3000</p>' +
      '</div>';
  }
}

loadData();
</script>

<div id="vehicle-panels"></div>

<script>
// ══════════════════════════════════════════════════
//  RENDER ENGINE — builds all HTML from GARAGE_DATA
// ══════════════════════════════════════════════════

const TAG_COLORS = {
  routine:'#5b9bd5', engine:'#e08c55', brake:'#5dba7d', cooling:'#c86e9a',
  electrical:'#e0d055', tires:'#8b8b8b', turbo:'#c8a96e', major:'#e05555',
  transmission:'#a78bfa', fuel:'#fb923c', inspection:'#5b9bd5', accessories:'#8b8b8b'
};

function fmtOdo(n){ return n ? n.toLocaleString() + ' mi' : ''; }
function fmtOdoDisplay(n){ return n ? n.toLocaleString() + ' mi' : ''; }

function tagBadge(tag){
  return `<span class="tag tag-${tag}">${tag}</span>`;
}

function renderTagBadges(tags){ return tags.map(tagBadge).join(''); }

// ── Overview cards ──────────────────────────────────
function renderOverviewCards(vd){
  const vc = vd.accentClass;
  return vd.overviewCards.map(c => {
    const odoHtml = c.odo ? `<div class="card-odo ${vc}">${c.odo}</div>` : '';
    const bodyHtml = c.body ? `<p style="font-size:12px;color:var(--text-dim);line-height:1.6;margin-top:8px;">${c.body}</p>` : '';
    return `<div class="card ${c.type}">
      <div class="card-date">${c.date}</div>
      <div class="card-title">${c.title}</div>
      <div class="card-shop">${c.shop}</div>
      ${bodyHtml}${odoHtml}
    </div>`;
  }).join('');
}

// ── Mileage bar section ──────────────────────────────
function renderMileageSection(vd){
  const rows = vd.mileageRows.map(r => `
    <div class="mile-row">
      <span class="mile-row-label">${r.label}</span>
      <div class="mile-track"><div class="mile-fill ${vd.accentClass}" style="width:${r.pct}%"></div></div>
      <span class="mile-row-value ${r.valueClass}">${r.value}</span>
    </div>`).join('');
  return `<div class="mileage-section" style="margin-top:28px;">
    <div class="mile-label">Mileage Progression</div>
    ${rows}
    <div class="ownership-badge">
      <span class="${vd.accentClass}">◈</span> ${vd.ownershipBadgeText}
    </div>
  </div>`;
}

// ── Timeline items ──────────────────────────────────
function renderTimeline(vid, sectionId){
  const vc = GARAGE_DATA.vehicles[vid].accentClass;
  const recs = GARAGE_DATA.records.filter(r => r.vehicle === vid && r.sections.includes(sectionId));
  return recs.map(r => {
    const odoLabel = r.odo ? ` · ${fmtOdo(r.odo)}` : '';
    const dotClass = `timeline-dot ${vc}${r.dot==='major' ? ' dot-major' : r.dot==='minor' ? ' dot-minor' : ''}`;
    return `<div class="timeline-item" data-title="${r.title.replace(/"/g,'&quot;')}">
      <div class="${dotClass}"></div>
      <div class="tl-date ${vc}">${r.date}${odoLabel}</div>
      <div class="tl-title">${r.title}</div>
      <div class="tl-meta">${r.shop}</div>
      <div class="tl-tags">${renderTagBadges(r.tags)}</div>
    </div>`;
  }).join('');
}

// ── Section cards (engine/brakes/etc) ──────────────
function renderSectionCards(vid, sectionId){
  const vd = GARAGE_DATA.vehicles[vid];
  const vc = vd.accentClass;
  const recs = GARAGE_DATA.records.filter(r => r.vehicle === vid && r.sections.includes(sectionId));
  if(!recs.length) return `<p style="color:var(--text-dim);font-size:13px;">No records in this section.</p>`;
  return `<div class="cards-grid">${recs.map(r => {
    const odoHtml = r.odo ? `<div class="card-odo ${vc}">${fmtOdo(r.odo)}</div>` : '';
    const cardType = r.tags[0] || 'routine';
    return `<div class="card ${cardType}">
      <div class="card-date">${r.date}${r.odo ? ' · ' + fmtOdo(r.odo) : ''}</div>
      <div class="card-title">${r.title}</div>
      <div class="card-shop">${r.shop}</div>
      ${odoHtml}
    </div>`;
  }).join('')}</div>`;
}

// ── Shops table ──────────────────────────────────────
function renderShopsTable(vd){
  const vc = vd.accentClass;
  const rows = vd.shops.map(s => `<tr>
    <td><div class="shop-name">${s.name}</div></td>
    <td><div class="shop-visits ${vc}">${s.visits}</div></td>
    <td><div class="shop-era">${s.period}</div></td>
    <td style="font-size:12px;color:var(--text-dim);">${s.note}</td>
  </tr>`).join('');
  return `<table class="shop-table">
    <thead><tr><th>Shop</th><th>Visits</th><th>Period</th><th>Notes</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Chart legend ─────────────────────────────────────
function renderLegend(datasets){
  return datasets.map(d =>
    `<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div>${d.label}</div>`
  ).join('');
}

// ── Nav sidebar ──────────────────────────────────────
function renderNav(vd){
  const nc = vd.navClass;
  return vd.sections.map((s,i) => {
    const countHtml = s.count ? `<span class="nav-count">${s.count}</span>` : '';
    const activeClass = i===0 ? ' active' : '';
    const dc = s.dotColor.startsWith('#') ? s.dotColor : (vd.id==='sierra' ? 'var(--sierra-accent)' : 'var(--accent)');
    return `<div class="nav-item ${nc}${activeClass}" onclick="showSection('${vd.id}','${s.id}',this)">
      <span class="nav-dot" style="background:${dc}"></span>
      <span class="nav-label">${s.label}</span>
      ${countHtml}
    </div>`;
  }).join('');
}

// ── Section alert ────────────────────────────────────
function renderAlert(alertDef){
  if(!alertDef) return '';
  const cardClass = alertDef.type ? ` ${alertDef.type}` : '';
  return `<div class="alert-card${cardClass}">
    <div class="alert-icon">${alertDef.icon}</div>
    <div class="alert-text">
      <h4 class="${alertDef.titleClass}">${alertDef.title}</h4>
      <p>${alertDef.body}</p>
    </div>
  </div>`;
}

// ── Special turbo card ───────────────────────────────
function renderTurboDetail(vid){
  const vd = GARAGE_DATA.vehicles[vid];
  const rec = GARAGE_DATA.records.find(r => r.vehicle===vid && r.tags.includes('turbo'));
  if(!rec) return '';
  const vc = vd.accentClass;
  return `<div class="card major" style="margin-top:20px;max-width:400px;">
    <div class="card-date">${rec.date}${rec.odo ? ' · ' + fmtOdo(rec.odo) : ''}</div>
    <div class="card-title">${rec.title}</div>
    <div class="card-shop">${rec.shop}</div>
    <p style="font-size:12px;color:var(--text-dim);line-height:1.7;margin-top:10px;">
      • Turbocharger replaced/repaired<br>
      • Oil line seal(s) replaced<br>
      • Oil and filter changed<br>
      • Full vehicle inspection
    </p>
    <div class="card-odo ${vc}">${fmtOdo(rec.odo)}</div>
  </div>`;
}

// ── Build all section content ────────────────────────
function buildSections(vd){
  const vid = vd.id;
  const nc = vd.navClass;
  const vc = vd.accentClass;
  const sections = vd.sections;
  const alerts = vd.sectionAlerts || {};

  return sections.map((s,i) => {
    const vis = i===0 ? ' visible' : '';
    let body = '';

    if(s.id === 'overview'){
      body = `${renderAlert(vd.alert)}
        ${renderMileageSection(vd)}
        <div class="cards-grid" style="margin-top:28px;">${renderOverviewCards(vd)}</div>`;
    } else if(s.id === 'timeline'){
      body = `<div class="timeline ${vc}-tl">${renderTimeline(vid,'timeline')}</div>`;
    } else if(s.id === 'turbo'){
      body = `${renderAlert(alerts.turbo || null)}${renderTurboDetail(vid)}`;
    } else if(s.id === 'shops'){
      body = renderShopsTable(vd);
    } else {
      const alertKey = s.id;
      const alertHtml = alerts[alertKey] ? renderAlert(alerts[alertKey]) : '';
      body = `${alertHtml}${renderSectionCards(vid, s.id)}`;
    }

    // section header subtitle map
    const subtitleMap = {
      overview:`${vd.year} – 2026 · ${vd.currentOdometer.toLocaleString()} mi`,
      timeline:'Chronological · All Services',
      engine: vid==='cayman'?'Spark Plugs · Belts · Filters · Oil':'Oil Changes · Filters · Maintenance',
      brakes:'Pads · Rotors · Fluid · Sensors',
      cooling:'Water Pump · Thermostat · Coolant · Sensors',
      turbo:'Mar 2026 · Major Repair',
      electrical:'Battery · Lights · Charging',
      tires:'Replacements · Rotations · Alignments',
      transmission:'Fluid · Differential · Service',
      fuel:'Spark Plugs · Fuel System · Induction',
      shops:'Where The Work Was Done'
    };

    return `<div id="${vid}-${s.id}" class="section${vis}">
      <div class="section-header">
        <h2 class="section-title">${s.label}</h2>
        <span class="section-subtitle">${subtitleMap[s.id]||''}</span>
      </div>
      ${body}
    </div>`;
  }).join('');
}

// ── Build one full vehicle panel ─────────────────────
function buildVehiclePanel(vd){
  const vid = vd.id;
  const vc  = vd.accentClass;
  const nc  = vd.navClass;
  const active = vid==='cayman' ? ' active' : '';

  const titleSpan = `<span class="${vc}-accent">${vd.model}</span>`;
  const makeSpan  = vd.make;

  return `<div class="vehicle-panel${active}" id="panel-${vid}">
  <header class="${vd.headerClass}">
    <div class="header-eyebrow ${vc}">Vehicle Service History</div>
    <h1>${makeSpan} ${titleSpan}<br>Maintenance Log</h1>
    <div class="header-meta">
      <div class="meta-item"><span class="meta-label">First Service</span><span class="meta-value">${vd.firstServiceDate}</span></div>
      <div class="meta-item"><span class="meta-label">Latest Service</span><span class="meta-value">${vd.latestServiceDate}</span></div>
      <div class="meta-item"><span class="meta-label">Current Odometer</span><span class="meta-value">${vd.currentOdometer.toLocaleString()} mi</span></div>
      <div class="meta-item"><span class="meta-label">Color</span><span class="meta-value">${vd.color}</span></div>
      <div class="meta-item"><span class="meta-label">Ownership Since</span><span class="meta-value">${vd.ownershipStart}</span></div>
    </div>
  </header>

  <div class="stats-bar">
    ${vd.stats.map(s=>`<div class="stat ${vc}"><div class="stat-number ${vc}">${s.number}</div><div class="stat-label">${s.label}</div></div>`).join('')}
  </div>

  <div class="charts-band">
    <div class="chart-pane">
      <div class="chart-title">Service Events by Type — Timeline</div>
      <canvas id="${vid}-serviceChart" height="95"></canvas>
      <div class="chart-legend">${renderLegend(vd.chartServiceTypes.datasets)}</div>
    </div>
    <div class="chart-pane">
      <div class="chart-title">Estimated Miles Driven Per Year</div>
      <canvas id="${vid}-milesChart" height="95"></canvas>
    </div>
  </div>

  <div class="main">
    <nav class="sidebar">
      <div class="sidebar-title">Sections</div>
      ${renderNav(vd)}
    </nav>
    <div class="content">
      ${buildSections(vd)}
    </div>
  </div>
</div>`;
}

// ── Mount everything — called after data.json loads ──
function initApp(){
  const panelContainer = document.getElementById('vehicle-panels');
  Object.values(GARAGE_DATA.vehicles).forEach(vd => {
    panelContainer.innerHTML += buildVehiclePanel(vd);
  });
  // Init first vehicle charts
  initCharts('cayman');
  chartsInitialized['cayman'] = true;
}
</script>

<script>
// ══════════════════════════════════════════════════
//  INTERACTION — tab switching, charts, search
// ══════════════════════════════════════════════════

const chartsInitialized = {};

function switchVehicle(v) {
  document.querySelectorAll('.vehicle-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.vtab').forEach(t => t.className = 'vtab');
  document.getElementById('panel-' + v).classList.add('active');
  const tabEl = document.getElementById('tab-' + v);
  tabEl.className = 'vtab active-' + v;
  if (!chartsInitialized[v]) { initCharts(v); chartsInitialized[v] = true; }
}

function showSection(vehicle, id, el) {
  const panel = document.getElementById('panel-' + vehicle);
  panel.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  panel.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(vehicle + '-' + id).classList.add('visible');
  el.classList.add('active');
}

// ── Charts ──────────────────────────────────────────
Chart.defaults.color = '#888';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;
const gridColor = 'rgba(255,255,255,0.05)';
const borderClr = 'rgba(255,255,255,0.08)';
const tooltipBase = {
  backgroundColor:'#161616', borderColor:'#242424', borderWidth:1,
  titleColor:'#c8a96e', bodyColor:'#d8d0c4', padding:10
};

function makeScales(stacked){
  return {
    x:{ stacked, grid:{color:gridColor}, border:{color:borderClr}, ticks:{color:'#888',font:{size:10}} },
    y:{ stacked, grid:{color:gridColor}, border:{color:borderClr}, ticks:{color:'#888',font:{size:10},stepSize:1,callback:v=>v===0?'':v}, min:0 }
  };
}
function makeMilesScales(){
  return {
    x:{ grid:{color:gridColor}, border:{color:borderClr}, ticks:{color:'#888',font:{size:10}} },
    y:{ grid:{color:gridColor}, border:{color:borderClr}, ticks:{color:'#888',font:{size:10},callback:v=>v===0?'':(v/1000).toFixed(0)+'k'}, min:0 }
  };
}

function initCharts(vid) {
  const vd = GARAGE_DATA.vehicles[vid];
  const acc = vd.accentColor;

  // Service by type
  new Chart(document.getElementById(vid + '-serviceChart'), {
    type: 'bar',
    data: {
      labels: vd.chartServiceTypes.labels,
      datasets: vd.chartServiceTypes.datasets.map(d => ({
        label: d.label,
        backgroundColor: d.color,
        data: d.data
      }))
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { ...tooltipBase, titleColor: acc,
          callbacks: { title: ctx=>'Year: '+ctx[0].label, label: ctx=>' '+ctx.dataset.label+': '+ctx.raw }
        }
      },
      scales: makeScales(true)
    }
  });

  // Miles per year
  const cd = vd.chartMiles;
  const avg = Math.round(cd.data.slice(0,-1).reduce((s,d)=>s+d,0) / (cd.data.length-1));
  new Chart(document.getElementById(vid + '-milesChart'), {
    type: 'bar',
    data: {
      labels: cd.labels,
      datasets: [
        {
          label: 'Miles',
          data: cd.data,
          backgroundColor: cd.data.map((m,i) => i===cd.data.length-1 ? acc+'59' : m>avg ? acc : '#2e2e2e'),
          borderColor: cd.data.map((_,i) => i===cd.data.length-1 ? acc : 'transparent'),
          borderWidth: 1
        },
        {
          label: 'Average', type: 'line', data: cd.data.map(()=>avg),
          borderColor: 'rgba(91,155,213,0.5)', borderWidth:1, borderDash:[4,3], pointRadius:0, fill:false
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { ...tooltipBase, titleColor: acc,
          callbacks: {
            title: ctx => ctx[0].label + (ctx[0].label===cd.partialYear ? ' (partial)' : ''),
            label: ctx => ctx.dataset.label==='Average'
              ? ' Avg: '+avg.toLocaleString()+' mi/yr'
              : ' Miles: '+ctx.raw.toLocaleString()
          }
        }
      },
      scales: makeMilesScales()
    }
  });
}

// Charts are initialised in initApp() above after data.json loads


// ── Search ──────────────────────────────────────────
function buildSearchIndex(){
  return GARAGE_DATA.records.map(r => {
    const vd = GARAGE_DATA.vehicles[r.vehicle];
    return {
      ...r,
      label: vd.make + ' ' + vd.model,
      odoDisplay: r.odo ? r.odo.toLocaleString() + ' mi' : ''
    };
  });
}
const SEARCH_INDEX = buildSearchIndex();

function highlight(text, query){
  if(!query) return text;
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>');
}

function onSearch(val){
  const q = val.trim().toLowerCase();
  const resultsEl = document.getElementById('search-results');
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  if(!q){ resultsEl.style.display='none'; return; }

  const matches = SEARCH_INDEX.filter(r =>
    r.title.toLowerCase().includes(q) ||
    r.shop.toLowerCase().includes(q) ||
    r.date.toLowerCase().includes(q) ||
    r.tags.some(t=>t.toLowerCase().includes(q)) ||
    r.label.toLowerCase().includes(q) ||
    r.odoDisplay.toLowerCase().includes(q)
  );

  document.getElementById('sr-count').textContent = matches.length + ' result' + (matches.length!==1?'s':'');
  const listEl = document.getElementById('sr-list');

  if(!matches.length){
    listEl.innerHTML = `<div class="sr-empty">No records found for "${val}"</div>`;
  } else {
    listEl.innerHTML = matches.map(r => {
      const tagHtml = r.tags.map(t => {
        const c = TAG_COLORS[t]||'#888';
        return `<span class="tag" style="color:${c};border-color:${c}33;background:${c}12">${t}</span>`;
      }).join('');
      const meta = [r.date, r.odoDisplay, r.shop].filter(Boolean).join(' · ');
      const safeTitle = r.title.replace(/'/g,"\\'");
      return `<div class="sr-item" onclick="goToRecord('${r.vehicle}','${safeTitle}')">
        <span class="sr-badge ${r.vehicle}">${r.label}</span>
        <div class="sr-body">
          <div class="sr-title">${highlight(r.title,val)}</div>
          <div class="sr-meta">${highlight(meta,val)}</div>
          <div class="sr-tags" style="margin-top:5px">${tagHtml}</div>
        </div>
      </div>`;
    }).join('');
  }
  resultsEl.style.display = 'block';
}

function goToRecord(vehicle, title){
  clearSearch();
  switchVehicle(vehicle);
  const panel = document.getElementById('panel-' + vehicle);
  panel.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  panel.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(vehicle+'-timeline').classList.add('visible');
  panel.querySelectorAll('.nav-item')[1].classList.add('active');

  const items = panel.querySelectorAll('#'+vehicle+'-timeline .timeline-item');
  let target = null;
  items.forEach(item => {
    if(item.dataset.title === title) target = item;
  });
  if(!target) return;

  panel.querySelectorAll('.timeline-item.search-hit').forEach(el=>{
    el.classList.remove('search-hit','sierra-hit');
  });
  target.classList.add('search-hit');
  if(vehicle==='sierra') target.classList.add('sierra-hit');
  setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'center'}),80);
  setTimeout(()=>target.classList.remove('search-hit','sierra-hit'),2200);
}

function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('search-results').style.display='none';
  document.getElementById('search-clear').style.display='none';
}

document.addEventListener('click', e=>{
  const sr=document.getElementById('search-results');
  const inp=document.getElementById('search-input');
  if(!sr.contains(e.target) && e.target!==inp) sr.style.display='none';
});
document.getElementById('search-input').addEventListener('focus',()=>{
  if(document.getElementById('search-input').value.trim())
    document.getElementById('search-results').style.display='block';
});
</script>
</body>
