<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage — Service History</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --black:#0a0a0a; --dark:#111111; --panel:#161616; --border:#242424;
    --accent:#c8a96e; --accent-dim:rgba(200,169,110,0.15); --accent-glow:rgba(200,169,110,0.05);
    --red:#e05555; --green:#5dba7d; --muted:#555;
    --text:#d8d0c4; --text-dim:#888; --white:#f0ece4;
    --sa:#5b9bd5; --sa-dim:rgba(91,155,213,0.15); --sa-glow:rgba(91,155,213,0.05);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}

  /* TABS */
  .vehicle-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:100;}
  .vtab{display:flex;align-items:center;gap:12px;padding:16px 32px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);user-select:none;}
  .vtab:hover{color:var(--text);background:rgba(255,255,255,.02);}
  .vtab.active-cayman{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-glow);}
  .vtab.active-sierra{color:var(--sa);border-bottom-color:var(--sa);background:var(--sa-glow);}
  .vtab-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid;}
  .vtab-badge-cayman{color:var(--accent);border-color:rgba(200,169,110,.3);background:var(--accent-dim);}
  .vtab-badge-sierra{color:var(--sa);border-color:rgba(91,155,213,.3);background:var(--sa-dim);}
  .garage-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;padding:16px 24px;border-right:1px solid var(--border);display:flex;align-items:center;}

  /* PANELS */
  .vehicle-panel{display:none;} .vehicle-panel.active{display:block;}

  /* HEADER */
  header{border-bottom:1px solid var(--border);padding:40px 64px 36px;position:relative;overflow:hidden;}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4;}
  header.sh::after{background:linear-gradient(90deg,transparent,var(--sa),transparent)!important;}
  .h-eye{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:12px;}
  .h-eye.s{color:var(--sa);}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,88px);letter-spacing:.04em;line-height:.9;color:var(--white);}
  .ca{color:var(--accent);} .sia{color:var(--sa);}
  .h-meta{display:flex;gap:40px;margin-top:24px;flex-wrap:wrap;}
  .mi{display:flex;flex-direction:column;gap:4px;}
  .ml{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;}
  .mv{font-family:'DM Mono',monospace;font-size:14px;color:var(--text);}

  /* STATS */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);}
  .stat{padding:28px 40px;border-right:1px solid var(--border);transition:background .3s;}
  .stat:last-child{border-right:none;}
  .stat:hover{background:var(--accent-glow);}
  .stat.s:hover{background:var(--sa-glow);}
  .sn{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;margin-bottom:6px;color:var(--accent);}
  .sn.s{color:var(--sa);}
  .sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;}

  /* CHARTS */
  .charts-band{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
  .chart-pane{padding:24px 36px 20px;border-right:1px solid var(--border);}
  .chart-pane:last-child{border-right:none;}
  .ct{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
  .cleg{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .cli{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);}
  .cld{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

  /* LAYOUT */
  .main{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 400px);}
  .sidebar{border-right:1px solid var(--border);padding:36px 0;position:sticky;top:53px;height:fit-content;}
  .sidebar-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;padding:0 28px 18px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 28px;cursor:pointer;transition:all .2s;border-left:2px solid transparent;}
  .nav-item:hover{background:var(--accent-glow);border-left-color:var(--accent);}
  .nav-item.active{border-left-color:var(--accent);background:var(--accent-glow);}
  .nav-item.active .nl{color:var(--accent);}
  .nav-item.sn-nav:hover{background:var(--sa-glow);border-left-color:var(--sa);}
  .nav-item.sn-nav.active{border-left-color:var(--sa);background:var(--sa-glow);}
  .nav-item.sn-nav.active .nl{color:var(--sa);}
  .ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .nl{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-dim);transition:color .2s;}
  .nc{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:2px 7px;border-radius:20px;}
  .content{padding:40px 52px;}
  .section{display:none;} .section.visible{display:block;animation:fadeIn .25s ease;}
  .sec-hdr{display:flex;align-items:baseline;gap:16px;margin-bottom:32px;padding-bottom:18px;border-bottom:1px solid var(--border);}
  .sec-title{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--white);letter-spacing:.05em;}
  .sec-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.15em;}

  /* CARDS */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:28px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:22px;transition:all .25s;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
  .cd{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
  .ct2{font-size:14px;font-weight:500;color:var(--white);margin-bottom:6px;line-height:1.4;}
  .csh{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:4px;}
  .codo{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);background:var(--accent-dim);padding:4px 10px;border-radius:2px;margin-top:8px;}
  .codo::before{content:'◈';font-size:8px;}
  .codo.s{color:var(--sa);background:var(--sa-dim);}

  /* card left-border colors by tag */
  .card.routine::before{background:#5b9bd5;} .card.engine::before{background:#e08c55;}
  .card.brake::before{background:#5dba7d;}   .card.cooling::before{background:#c86e9a;}
  .card.electrical::before{background:#e0d055;} .card.major::before{background:var(--red);}
  .card.transmission::before{background:#a78bfa;} .card.fuel::before{background:#fb923c;}
  .card.turbo::before{background:var(--accent);} .card.tires::before{background:#8b8b8b;}

  /* ALERT */
  .alert-card{border-radius:2px;padding:18px 22px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px;background:rgba(224,85,85,.05);border:1px solid rgba(224,85,85,.25);}
  .ai{font-size:17px;flex-shrink:0;margin-top:2px;}
  .at h4{font-size:13px;font-weight:500;margin-bottom:4px;}
  .at p{font-size:12px;color:var(--text-dim);line-height:1.6;}

  /* TIMELINE */
  .timeline{position:relative;padding-left:30px;}
  .timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:linear-gradient(180deg,var(--accent) 0%,var(--border) 40%);}
  .timeline.stl::before{background:linear-gradient(180deg,var(--sa) 0%,var(--border) 40%);}
  .tli{position:relative;margin-bottom:24px;animation:fadeLeft .4s ease forwards;opacity:0;}
  .tli:nth-child(1){animation-delay:.04s} .tli:nth-child(2){animation-delay:.08s}
  .tli:nth-child(3){animation-delay:.12s} .tli:nth-child(4){animation-delay:.16s}
  .tli:nth-child(5){animation-delay:.20s} .tli:nth-child(6){animation-delay:.24s}
  .tli:nth-child(7){animation-delay:.28s} .tli:nth-child(8){animation-delay:.32s}
  .tli:nth-child(9){animation-delay:.36s} .tli:nth-child(10){animation-delay:.40s}
  .tdot{position:absolute;left:-26px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--black);background:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
  .tdot.s{background:var(--sa);box-shadow:0 0 0 3px var(--sa-dim);}
  .tdot.major{width:15px;height:15px;left:-27px;box-shadow:0 0 0 4px var(--accent-dim),0 0 12px rgba(200,169,110,.3);}
  .tdot.minor{background:var(--panel);border-color:var(--border);box-shadow:none;width:10px;height:10px;left:-24px;}
  .td{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-bottom:5px;}
  .td.s{color:var(--sa);}
  .tt{font-size:14px;font-weight:500;color:var(--white);margin-bottom:3px;}
  .tm{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}
  .ttags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}

  /* search hit pulse */
  .tli.hit{border-left:2px solid var(--accent);padding-left:10px;margin-left:-12px;border-radius:2px;animation:sPulse 2s ease forwards;}
  .tli.hit.shits{border-left-color:var(--sa);animation:sPulseS 2s ease forwards;}
  @keyframes sPulse{0%{background:rgba(200,169,110,.18)}60%{background:rgba(200,169,110,.10)}100%{background:transparent}}
  @keyframes sPulseS{0%{background:rgba(91,155,213,.18)}60%{background:rgba(91,155,213,.10)}100%{background:transparent}}

  /* TAGS — single unified palette, used everywhere */
  .tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:2px;border:1px solid;}
  .tag-routine{color:#5b9bd5;border-color:rgba(91,155,213,.3);background:rgba(91,155,213,.07);}
  .tag-engine{color:#e08c55;border-color:rgba(224,140,85,.3);background:rgba(224,140,85,.07);}
  .tag-brake{color:#5dba7d;border-color:rgba(93,186,125,.3);background:rgba(93,186,125,.07);}
  .tag-cooling{color:#c86e9a;border-color:rgba(200,110,154,.3);background:rgba(200,110,154,.07);}
  .tag-electrical{color:#e0d055;border-color:rgba(224,208,85,.3);background:rgba(224,208,85,.07);}
  .tag-turbo{color:#c8a96e;border-color:rgba(200,169,110,.3);background:rgba(200,169,110,.07);}
  .tag-transmission{color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.07);}
  .tag-fuel{color:#fb923c;border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.07);}
  .tag-tires{color:#8b8b8b;border-color:rgba(139,139,139,.3);background:rgba(139,139,139,.07);}
  .tag-major{color:var(--red);border-color:rgba(224,85,85,.3);background:rgba(224,85,85,.07);}

  /* MILEAGE BARS */
  .mile-wrap{margin:28px 0 36px;}
  .mile-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:20px;}
  .mile-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .mile-key{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:72px;}
  .mile-track{flex:1;height:4px;background:var(--border);border-radius:2px;}
  .mile-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#5b9bd5,var(--accent));}
  .mile-fill.s{background:linear-gradient(90deg,#2563a8,var(--sa));}
  .mile-val{font-family:'DM Mono',monospace;font-size:11px;width:58px;text-align:right;}
  .own-badge{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);padding:9px 14px;border-radius:2px;margin-top:16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}

  /* SHOP TABLE */
  .shop-table{width:100%;border-collapse:collapse;}
  .shop-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);}
  .shop-table td{font-size:13px;padding:13px 14px;border-bottom:1px solid rgba(36,36,36,.5);vertical-align:top;}
  .shop-table tr:last-child td{border-bottom:none;}
  .shop-table tr:hover td{background:var(--accent-glow);}
  .shn{font-weight:500;color:var(--white);font-size:13px;}
  .shv{font-family:'DM Mono',monospace;font-size:20px;color:var(--accent);}
  .shv.s{color:var(--sa);}
  .she{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}

  /* MAINTENANCE SCHEDULE */
  .maint-intro{font-size:13px;color:var(--text-dim);line-height:1.7;margin-bottom:28px;max-width:680px;}
  .maint-band{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:24px;}
  .maint-row{display:grid;grid-template-columns:130px 1fr 160px;border-bottom:1px solid var(--border);transition:background .15s;}
  .maint-row:last-child{border-bottom:none;}
  .maint-row:hover{background:var(--panel);}
  .maint-row.header-row{background:var(--panel);}
  .maint-cell{padding:13px 18px;font-size:13px;}
  .maint-cell.mhdr{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;padding:10px 18px;}
  .maint-mi{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:500;}
  .maint-mi.s{color:var(--sa);}
  .maint-item{color:var(--white);font-size:13px;line-height:1.5;}
  .maint-status{font-family:'DM Mono',monospace;font-size:10px;padding:4px 9px;border-radius:2px;border:1px solid;display:inline-block;white-space:nowrap;}
  .maint-status.due{color:var(--red);border-color:rgba(224,85,85,.35);background:rgba(224,85,85,.08);}
  .maint-status.upcoming{color:#e08c55;border-color:rgba(224,140,85,.35);background:rgba(224,140,85,.08);}
  .maint-status.ok{color:var(--green);border-color:rgba(93,186,125,.35);background:rgba(93,186,125,.08);}
  .maint-status.na{color:var(--muted);border-color:rgba(85,85,85,.3);background:rgba(85,85,85,.06);}
  .maint-note{font-size:12px;color:var(--text-dim);margin-top:3px;line-height:1.5;}
  .maint-section-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin:28px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border);}

  /* SEARCH */
  .search-wrap{margin-left:auto;display:flex;align-items:center;padding:0 20px;border-left:1px solid var(--border);}
  .siw{position:relative;display:flex;align-items:center;}
  .sic{position:absolute;left:10px;color:var(--muted);font-size:13px;pointer-events:none;}
  #search-input{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:7px 28px 7px 30px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);width:210px;outline:none;transition:border-color .2s,width .3s;}
  #search-input::placeholder{color:var(--muted);}
  #search-input:focus{border-color:var(--accent);width:270px;}
  .scl{position:absolute;right:8px;cursor:pointer;color:var(--muted);font-size:15px;display:none;line-height:1;transition:color .2s;}
  .scl:hover{color:var(--text);}
  #search-results{display:none;position:absolute;top:53px;left:0;right:0;background:var(--dark);border-bottom:2px solid var(--border);z-index:98;max-height:72vh;overflow-y:auto;animation:fadeIn .15s ease;}
  .srh{display:flex;justify-content:space-between;align-items:center;padding:12px 32px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;position:sticky;top:0;background:var(--dark);z-index:1;}
  .src{color:var(--accent);}
  .sri{display:flex;align-items:flex-start;gap:14px;padding:13px 32px;border-bottom:1px solid rgba(36,36,36,.6);cursor:pointer;transition:background .12s;}
  .sri:hover{background:var(--panel);}
  .sri:last-child{border-bottom:none;}
  .srb{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid;flex-shrink:0;margin-top:2px;white-space:nowrap;}
  .srb.cayman{color:var(--accent);border-color:rgba(200,169,110,.35);background:var(--accent-dim);}
  .srb.sierra{color:var(--sa);border-color:rgba(91,155,213,.35);background:var(--sa-dim);}
  .srbody{flex:1;min-width:0;}
  .srtitle{font-size:13px;font-weight:500;color:var(--white);margin-bottom:3px;line-height:1.4;}
  .srtitle mark{background:rgba(200,169,110,.2);color:var(--accent);border-radius:2px;padding:0 2px;}
  .srmeta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);}
  .srtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .srempty{padding:48px 32px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeLeft{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

  @media(max-width:900px){
    header{padding:28px 24px;}
    .stats-bar{grid-template-columns:repeat(2,1fr);}
    .charts-band{grid-template-columns:1fr;}
    .chart-pane{border-right:none;border-bottom:1px solid var(--border);}
    .main{grid-template-columns:1fr;}
    .sidebar{position:static;border-right:none;border-bottom:1px solid var(--border);padding:20px 0;}
    .content{padding:28px 20px;}
    .vehicle-tabs{flex-wrap:wrap;}
    .garage-label{display:none;}
    .search-wrap{padding:10px 16px;border-left:none;border-top:1px solid var(--border);width:100%;}
    #search-input,#search-input:focus{width:100%;}
    .maint-row{grid-template-columns:100px 1fr 120px;}
  }
</style>
</head>
<body>
<script>
// ═══════════════════════════════════════════════════════════════
//  UNIFIED TAG TAXONOMY — MECE, used identically everywhere:
//  cards, timeline dots, nav badges, search, chart legend
//
//  routine      — oil changes, inspections, general maintenance
//  engine       — engine mechanical work (belts, pumps, plugs)
//  brake        — brakes, rotors, brake fluid
//  cooling      — coolant, thermostat, water pump, radiator
//  turbo        — turbocharger and boost-related
//  electrical   — battery, lighting, modules, sensors
//  transmission — transmission, differential, transfer case
//  fuel         — fuel system, injectors, spark (where fuel-focused)
//  tires        — tires, wheels, alignment, rotation
//
//  'major' is a DOT STYLE only (not a filter tag) — applied to
//  significant repairs to make them visually prominent in the timeline.
// ═══════════════════════════════════════════════════════════════

const GARAGE = {

  // ─────────────────────────────────────────
  //  PORSCHE 718 CAYMAN
  // ─────────────────────────────────────────
  cayman: {
    meta: {
      eyebrow:'Vehicle Service History', make:'Porsche', model:'718 Cayman',
      subtitle:'Maintenance Log', firstService:'Jan 2017', latestService:'Mar 2026',
      odometer:'71,774 mi', color:'Black', ownedSince:'Dec 2023',
    },

<script>
// ── UNIFIED TAG STYLES ─────────────────────────────────────────
// Single source of truth for every label, color, and CSS class.
// Used in: timeline tags, card borders, search results, chart legends.
const TS = {
  routine:      {cls:'tag-routine',     label:'Oil & Routine', color:'#5b9bd5'},
  engine:       {cls:'tag-engine',      label:'Engine',        color:'#e08c55'},
  brake:        {cls:'tag-brake',       label:'Brakes',        color:'#5dba7d'},
  cooling:      {cls:'tag-cooling',     label:'Cooling',       color:'#c86e9a'},
  electrical:   {cls:'tag-electrical',  label:'Electrical',    color:'#e0d055'},
  turbo:        {cls:'tag-turbo',       label:'Turbo',         color:'#c8a96e'},
  transmission: {cls:'tag-transmission',label:'Transmission',  color:'#a78bfa'},
  fuel:         {cls:'tag-fuel',        label:'Fuel',          color:'#fb923c'},
  tires:        {cls:'tag-tires',       label:'Tires',         color:'#8b8b8b'},
};

function tagHtml(tags) {
  return tags.map(t => {
    const s = TS[t];
    return s ? `<span class="tag ${s.cls}">${s.label}</span>` : '';
  }).join('');
}

// ── RENDER HELPERS ─────────────────────────────────────────────
function alertHtml(a, v) {
  if (!a) return '';
  const warn = a.style === 'warn';
  const infoS = a.style === 'info-s';
  const bk = warn ? 'rgba(224,85,85,.05)' : infoS ? 'rgba(91,155,213,.05)' : 'rgba(200,110,154,.05)';
  const bd = warn ? 'rgba(224,85,85,.25)' : infoS ? 'rgba(91,155,213,.25)' : 'rgba(200,110,154,.25)';
  const tc = warn ? 'var(--red)' : infoS ? 'var(--sa)' : '#c86e9a';
  return `<div class="alert-card" style="background:${bk};border-color:${bd};">
    <div class="ai">${a.icon}</div>
    <div class="at"><h4 style="color:${tc};">${a.title}</h4><p>${a.body}</p></div>
  </div>`;
}

function tliHtml(item, v) {
  const isSierra = v === 'sierra';
  const dc = item.dot === 's' ? 'tdot s'
    : item.dot === 'major' ? 'tdot major'
    : item.dot === 'minor' ? 'tdot minor'
    : 'tdot';
  return `<div class="tli">
    <div class="${dc}"></div>
    <div class="td${isSierra?' s':''}">${item.date}</div>
    <div class="tt">${item.title}</div>
    <div class="tm">${item.shop}</div>
    <div class="ttags">${tagHtml(item.tags)}</div>
  </div>`;
}

function mileBarHtml(v) {
  const d = GARAGE[v];
  const isSierra = v === 'sierra';
  const accentVar = isSierra ? 'var(--sa)' : 'var(--accent)';
  const bars = d.mileageProgress.map(b => `
    <div class="mile-row">
      <span class="mile-key">${b.label}</span>
      <div class="mile-track"><div class="mile-fill${isSierra?' s':''}" style="width:${b.width}"></div></div>
      <span class="mile-val" style="color:${b.hi ? accentVar : 'var(--text-dim)'};">${b.value}</span>
    </div>`).join('');
  return `<div class="mile-wrap">
    <div class="mile-lbl">Mileage Progression</div>
    ${bars}
    <div class="own-badge">◈ ${d.ownershipNote}</div>
  </div>`;
}

function scheduleHtml(d, v) {
  const isSierra = v === 'sierra';
  const sc = d.schedule;
  let h = `<p class="maint-intro">${sc.intro}</p>`;
  sc.sections.forEach(sec => {
    h += `<div class="maint-section-lbl">${sec.label}</div>`;
    h += `<div class="maint-band">
      <div class="maint-row header-row">
        <div class="maint-cell mhdr">Mileage</div>
        <div class="maint-cell mhdr">Service Item</div>
        <div class="maint-cell mhdr">Status</div>
      </div>`;
    sec.items.forEach(item => {
      const sc2 = {due:'due',upcoming:'upcoming',ok:'ok',na:'na'}[item.status] || 'na';
      const sl2 = {due:'Overdue',upcoming:'Due Soon',ok:'On Track',na:'N/A'}[item.status] || 'N/A';
      h += `<div class="maint-row">
        <div class="maint-cell"><span class="maint-mi${isSierra?' s':''}">${item.mi}</span></div>
        <div class="maint-cell">
          <div class="maint-item">${item.service}</div>
          <div class="maint-note">${item.note}</div>
        </div>
        <div class="maint-cell" style="display:flex;align-items:flex-start;padding-top:16px;">
          <span class="maint-status ${sc2}">${sl2}</span>
        </div>
      </div>`;
    });
    h += '</div>';
  });
  return h;
}

function shopsHtml(shops, v) {
  const isSierra = v === 'sierra';
  const rows = shops.map(s => `<tr>
    <td><div class="shn">${s.name}</div></td>
    <td><div class="shv${isSierra?' s':''}">${s.visits}</div></td>
    <td><div class="she">${s.period}</div></td>
    <td style="font-size:12px;color:var(--text-dim);">${s.notes}</td>
  </tr>`).join('');
  return `<table class="shop-table">
    <thead><tr><th>Shop</th><th>Visits</th><th>Period</th><th>Notes</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── BUILD SECTIONS ─────────────────────────────────────────────
function buildSections(v) {
  const d = GARAGE[v];
  const isSierra = v === 'sierra';
  let h = '';

  d.navSections.forEach((nav, idx) => {
    h += `<div id="${v}-${nav.id}" class="section${idx===0?' visible':''}">`;

    if (nav.id === 'overview') {
      h += `<div class="sec-hdr">
        <h2 class="sec-title">Overview</h2>
        <span class="sec-sub">${d.meta.firstService} – ${d.meta.latestService} · ${d.meta.odometer}</span>
      </div>
      ${alertHtml(d.alerts?.overview, v)}
      ${mileBarHtml(v)}`;
      // Featured cards: non-minor records, up to 4
      const feat = d.timeline.filter(t => t.dot !== 'minor').slice(0,4);
      if (feat.length) {
        h += '<div class="cards-grid" style="margin-top:28px;">';
        feat.forEach(item => {
          const ct = item.tags[0] || 'routine';
          const odo = item.date.includes('·') ? item.date.split('·')[1].trim() : '';
          h += `<div class="card ${ct}">
            <div class="cd">${item.date}</div>
            <div class="ct2">${item.title}</div>
            <div class="csh">${item.shop}</div>
            ${odo?`<div class="codo${isSierra?' s':''}">${odo}</div>`:''}
          </div>`;
        });
        h += '</div>';
      }
    }

    else if (nav.id === 'timeline') {
      h += `<div class="sec-hdr">
        <h2 class="sec-title">Full Timeline</h2>
        <span class="sec-sub">Chronological · All ${d.timeline.length} Services</span>
      </div>
      <div class="timeline${isSierra?' stl':''}">
        ${d.timeline.map(item => tliHtml(item, v)).join('')}
      </div>`;
    }

    else if (nav.id === 'schedule') {
      h += `<div class="sec-hdr">
        <h2 class="sec-title">Maintenance Schedule</h2>
        <span class="sec-sub">Manufacturer Recommended · Forward Looking</span>
      </div>
      ${scheduleHtml(d, v)}`;
    }

    else if (nav.id === 'shops') {
      h += `<div class="sec-hdr">
        <h2 class="sec-title">Service Shops</h2>
        <span class="sec-sub">Where The Work Was Done</span>
      </div>
      ${shopsHtml(d.shops, v)}`;
    }

    else {
      // Generic filtered section — uses nav.filterTags exclusively.
      // Records appear here if ANY of their tags match filterTags.
      // A record with ['routine','brake'] will appear in both Oil & Routine
      // and Brakes — this is correct as the work genuinely covers both.
      const ft = nav.filterTags || [];
      const items = d.timeline.filter(t => t.tags.some(tag => ft.includes(tag)));

      h += `<div class="sec-hdr">
        <h2 class="sec-title">${nav.label}</h2>
        <span class="sec-sub">${items.length} Record${items.length!==1?'s':''}</span>
      </div>
      ${d.alerts?.[nav.id] ? alertHtml(d.alerts[nav.id], v) : ''}
      <div class="cards-grid">`;

      items.forEach(item => {
        const ct = item.tags[0] || 'routine';
        const odo = item.date.includes('·') ? item.date.split('·')[1].trim() : '';
        h += `<div class="card ${ct}">
          <div class="cd">${item.date}</div>
          <div class="ct2">${item.title}</div>
          <div class="csh">${item.shop}</div>
          ${odo?`<div class="codo${isSierra?' s':''}">${odo}</div>`:''}
        </div>`;
      });
      h += '</div>';
    }

    h += '</div>';
  });
  return h;
}

// ── BUILD PANEL ────────────────────────────────────────────────
function buildPanel(v) {
  const d = GARAGE[v];
  const isSierra = v === 'sierra';

  const statsH = d.stats.map(s => `<div class="stat${isSierra?' s':''}">
    <div class="sn${isSierra?' s':''}">${s.number}</div>
    <div class="sl">${s.label}</div>
  </div>`).join('');

  const legH = d.serviceChart.legend.map(lbl => {
    const col = d.serviceChart.datasets.find(ds => ds.label===lbl)?.color||'#888';
    return `<div class="cli"><div class="cld" style="background:${col}"></div>${lbl}</div>`;
  }).join('');

  const navH = d.navSections.map((nav, idx) => `
    <div class="nav-item${isSierra?' sn-nav':''} ${idx===0?'active':''}"
         onclick="showSection('${v}','${nav.id}',this)">
      <span class="ndot" style="background:${nav.dot}"></span>
      <span class="nl">${nav.label}</span>
      ${nav.count?`<span class="nc">${nav.count}</span>`:''}
    </div>`).join('');

  return `<div class="vehicle-panel${v==='cayman'?' active':''}" id="panel-${v}">
  <header${isSierra?' class="sh"':''}>
    <div class="h-eye${isSierra?' s':''}">${d.meta.eyebrow}</div>
    <h1>${d.meta.make} <span class="${isSierra?'sia':'ca'}">${d.meta.model}</span><br>${d.meta.subtitle}</h1>
    <div class="h-meta">
      <div class="mi"><span class="ml">First Service</span><span class="mv">${d.meta.firstService}</span></div>
      <div class="mi"><span class="ml">Latest Service</span><span class="mv">${d.meta.latestService}</span></div>
      <div class="mi"><span class="ml">Current Odometer</span><span class="mv">${d.meta.odometer}</span></div>
      <div class="mi"><span class="ml">Color</span><span class="mv">${d.meta.color}</span></div>
      <div class="mi"><span class="ml">Ownership Since</span><span class="mv">${d.meta.ownedSince}</span></div>
    </div>
  </header>
  <div class="stats-bar">${statsH}</div>
  <div class="charts-band">
    <div class="chart-pane">
      <div class="ct">Service Events by Type — Timeline</div>
      <canvas id="${v}-sc" height="95"></canvas>
      <div class="cleg">${legH}</div>
    </div>
    <div class="chart-pane">
      <div class="ct">Estimated Miles Driven Per Year</div>
      <canvas id="${v}-mc" height="95"></canvas>
    </div>
  </div>
  <div class="main">
    <nav class="sidebar">
      <div class="sidebar-title">Sections</div>
      ${navH}
    </nav>
    <div class="content">${buildSections(v)}</div>
  </div>
</div>`;
}

// ── BUILD TABS ─────────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById('vtabs');
  Object.keys(GARAGE).forEach(v => {
    const d = GARAGE[v];
    const isFirst = v==='cayman';
    const div = document.createElement('div');
    div.className = `vtab${isFirst?' active-'+v:''}`;
    div.id = `tab-${v}`;
    div.setAttribute('onclick',`switchVehicle('${v}')`);
    div.innerHTML = `<span>${d.meta.model}</span><span class="vtab-badge vtab-badge-${v}">${d.meta.make}</span>`;
    el.insertBefore(div, el.querySelector('.search-wrap'));
  });
}

// ── INIT ───────────────────────────────────────────────────────
let chartsInited = {};
document.addEventListener('DOMContentLoaded', () => {
  buildTabs();
  const c = document.getElementById('panels');
  Object.keys(GARAGE).forEach(v => { c.innerHTML += buildPanel(v); });
  initCharts('cayman');
  chartsInited['cayman'] = true;
});

function switchVehicle(v) {
  document.querySelectorAll('.vehicle-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.vtab').forEach(t => { t.className='vtab'; });
  document.getElementById('panel-'+v).classList.add('active');
  document.getElementById('tab-'+v).classList.add('active-'+v);
  if (!chartsInited[v]) { initCharts(v); chartsInited[v]=true; }
}

function showSection(vehicle, id, el) {
  const panel = document.getElementById('panel-'+vehicle);
  panel.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  panel.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(vehicle+'-'+id).classList.add('visible');
  el.classList.add('active');
}

// ── CHARTS ─────────────────────────────────────────────────────
Chart.defaults.color='#888';
Chart.defaults.font.family="'DM Mono',monospace";
Chart.defaults.font.size=10;
const gc='rgba(255,255,255,.05)', bc='rgba(255,255,255,.08)';
const ttDef={backgroundColor:'#161616',borderColor:'#242424',borderWidth:1,bodyColor:'#d8d0c4',padding:10};
const mkScales=stacked=>({
  x:{stacked,grid:{color:gc},border:{color:bc},ticks:{color:'#888',font:{size:10}}},
  y:{stacked,grid:{color:gc},border:{color:bc},ticks:{color:'#888',font:{size:10},stepSize:1,callback:v=>v===0?'':v},min:0}
});
const mkMiScales=()=>({
  x:{grid:{color:gc},border:{color:bc},ticks:{color:'#888',font:{size:10}}},
  y:{grid:{color:gc},border:{color:bc},ticks:{color:'#888',font:{size:10},callback:v=>v===0?'':(v/1000).toFixed(0)+'k'},min:0}
});

function initCharts(v) {
  const d = GARAGE[v];
  const isSierra = v==='sierra';
  const titleColor = isSierra ? '#5b9bd5' : '#c8a96e';

  new Chart(document.getElementById(v+'-sc'),{
    type:'bar',
    data:{labels:d.serviceChart.labels,datasets:d.serviceChart.datasets.map(ds=>({label:ds.label,backgroundColor:ds.color,data:ds.data}))},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{...ttDef,titleColor,callbacks:{title:ctx=>'Year: '+ctx[0].label,label:ctx=>' '+ctx.dataset.label+': '+ctx.raw}}},scales:mkScales(true)}
  });

  const mpy=d.milesPerYear;
  const avg=Math.round(mpy.data.slice(0,mpy.partial).reduce((s,n)=>s+n,0)/mpy.partial);
  const af=isSierra?'#5b9bd5':'#c8a96e';
  const afd=isSierra?'rgba(91,155,213,.35)':'rgba(200,169,110,.35)';
  const lc=isSierra?'rgba(200,169,110,.5)':'rgba(91,155,213,.5)';

  new Chart(document.getElementById(v+'-mc'),{
    type:'bar',
    data:{labels:mpy.labels,datasets:[
      {label:'Miles',data:mpy.data,backgroundColor:mpy.data.map((m,i)=>i===mpy.partial?afd:m>avg?af:'#2e2e2e'),borderColor:mpy.data.map((_,i)=>i===mpy.partial?af:'transparent'),borderWidth:1},
      {label:'Average',type:'line',data:mpy.data.map(()=>avg),borderColor:lc,borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false}
    ]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{...ttDef,titleColor,callbacks:{
      title:ctx=>ctx[0].label+(ctx[0].dataIndex===mpy.partial?' (partial)':''),
      label:ctx=>ctx.dataset.label==='Average'?' Avg: '+avg.toLocaleString()+' mi/yr':' Miles: '+ctx.raw.toLocaleString()
    }}},scales:mkMiScales()}
  });
}

// ── SEARCH ─────────────────────────────────────────────────────
function buildIdx() {
  const idx=[];
  Object.keys(GARAGE).forEach(v=>{
    GARAGE[v].timeline.forEach(item=>{
      const odo=item.date.includes('·')?item.date.split('·')[1].trim():'';
      idx.push({v,label:GARAGE[v].meta.make+' '+GARAGE[v].meta.model,
        date:item.date.split('·')[0].trim(),odo,shop:item.shop,title:item.title,
        tags:item.tags.map(t=>TS[t]?.label||t)});
    });
  });
  return idx;
}

function hl(text,q){
  if(!q)return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark>$1</mark>');
}

function onSearch(val){
  const q=val.trim().toLowerCase();
  const re=document.getElementById('search-results'),cl=document.getElementById('scl');
  const li=document.getElementById('srl'),cnt=document.getElementById('src');
  cl.style.display=q?'block':'none';
  if(!q){re.style.display='none';return;}
  const matches=buildIdx().filter(r=>
    r.title.toLowerCase().includes(q)||r.shop.toLowerCase().includes(q)||
    r.date.toLowerCase().includes(q)||r.tags.some(t=>t.toLowerCase().includes(q))||
    r.label.toLowerCase().includes(q)||r.odo.toLowerCase().includes(q)
  );
  cnt.textContent=matches.length+' result'+(matches.length!==1?'s':'');
  if(!matches.length){li.innerHTML=`<div class="srempty">No records found for "${val}"</div>`;}
  else{
    li.innerHTML=matches.map(r=>{
      const th=r.tags.map(t=>{const ts=Object.values(TS).find(s=>s.label===t);const c=ts?.color||'#888';return`<span class="tag" style="color:${c};border-color:${c}33;background:${c}12">${t}</span>`;}).join('');
      const meta=[r.date,r.odo,r.shop].filter(Boolean).join(' · ');
      return`<div class="sri" onclick="goToRecord('${r.v}','${r.title.replace(/'/g,"\\'")}')">
        <span class="srb ${r.v}">${r.label}</span>
        <div class="srbody">
          <div class="srtitle">${hl(r.title,val)}</div>
          <div class="srmeta">${hl(meta,val)}</div>
          <div class="srtags">${th}</div>
        </div>
      </div>`;
    }).join('');
  }
  re.style.display='block';
}

function goToRecord(v,title){
  clearSearch(); switchVehicle(v);
  const panel=document.getElementById('panel-'+v);
  panel.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  panel.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(v+'-timeline').classList.add('visible');
  panel.querySelectorAll('.nav-item')[1].classList.add('active');
  let target=null;
  panel.querySelectorAll('#'+v+'-timeline .tli').forEach(el=>{
    if(el.querySelector('.tt')?.textContent.trim()===title.trim()) target=el;
  });
  if(!target)return;
  panel.querySelectorAll('.tli.hit').forEach(el=>el.classList.remove('hit','shits'));
  target.classList.add('hit');
  if(v==='sierra') target.classList.add('shits');
  setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'center'}),80);
  setTimeout(()=>target.classList.remove('hit','shits'),2200);
}

function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('search-results').style.display='none';
  document.getElementById('scl').style.display='none';
}

document.addEventListener('click',e=>{
  const sr=document.getElementById('search-results'),inp=document.getElementById('search-input');
  if(sr&&!sr.contains(e.target)&&e.target!==inp) sr.style.display='none';
});
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('search-input').addEventListener('focus',()=>{
    if(document.getElementById('search-input').value.trim())
      document.getElementById('search-results').style.display='block';
  });
});
</script>
</body>
</html>
