<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage — Service History</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --panel: #161616;
    --border: #242424;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.15);
    --accent-glow: rgba(200,169,110,0.05);
    --red: #e05555;
    --green: #5dba7d;
    --blue: #5b9bd5;
    --muted: #555;
    --text: #d8d0c4;
    --text-dim: #888;
    --white: #f0ece4;
    --sierra-accent: #5b9bd5;
    --sierra-dim: rgba(91,155,213,0.15);
    --sierra-glow: rgba(91,155,213,0.05);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none; z-index:9999; opacity:0.4;
  }

  /* ── VEHICLE TABS ── */
  .vehicle-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .vtab {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    user-select: none;
  }

  .vtab:hover { color: var(--text); background: rgba(255,255,255,0.02); }

  .vtab.active-cayman {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--accent-glow);
  }

  .vtab.active-sierra {
    color: var(--sierra-accent);
    border-bottom-color: var(--sierra-accent);
    background: var(--sierra-glow);
  }

  .vtab-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid;
  }

  .vtab-badge-cayman { color: var(--accent); border-color: rgba(200,169,110,0.3); background: var(--accent-dim); }
  .vtab-badge-sierra { color: var(--sierra-accent); border-color: rgba(91,155,213,0.3); background: var(--sierra-dim); }

  .garage-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 16px 24px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
  }

  /* ── VEHICLE PANELS ── */
  .vehicle-panel { display: none; }
  .vehicle-panel.active { display: block; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 40px 64px 36px;
    position: relative;
    overflow: hidden;
  }

  header.sierra-header::after {
    background: linear-gradient(90deg, transparent, var(--sierra-accent), transparent) !important;
  }

  header::after {
    content:'';
    position:absolute;
    bottom:0; left:0; right:0;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity:0.4;
  }

  .header-eyebrow {
    font-family:'DM Mono',monospace;
    font-size:10px; letter-spacing:0.3em;
    color:var(--accent);
    text-transform:uppercase;
    margin-bottom:12px;
  }

  .header-eyebrow.sierra { color: var(--sierra-accent); }

  header h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(40px,7vw,88px);
    letter-spacing:0.04em;
    line-height:0.9;
    color:var(--white);
  }

  header h1 span.cayman-accent { color:var(--accent); }
  header h1 span.sierra-accent { color:var(--sierra-accent); }

  .header-meta {
    display:flex; gap:40px;
    margin-top:24px;
    flex-wrap:wrap;
  }

  .meta-item { display:flex; flex-direction:column; gap:4px; }

  .meta-label {
    font-family:'DM Mono',monospace;
    font-size:9px; letter-spacing:0.25em;
    color:var(--muted); text-transform:uppercase;
  }

  .meta-value {
    font-family:'DM Mono',monospace;
    font-size:14px; color:var(--text);
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    border-bottom:1px solid var(--border);
  }

  .stat {
    padding:28px 40px;
    border-right:1px solid var(--border);
    transition:background 0.3s ease;
  }

  .stat:last-child { border-right:none; }
  .stat:hover { background:var(--accent-glow); }
  .stat.sierra:hover { background:var(--sierra-glow); }

  .stat-number {
    font-family:'Bebas Neue',sans-serif;
    font-size:44px; line-height:1;
    margin-bottom:6px;
    color:var(--accent);
  }

  .stat-number.sierra { color:var(--sierra-accent); }

  .stat-label {
    font-family:'DM Mono',monospace;
    font-size:9px; letter-spacing:0.2em;
    color:var(--text-dim); text-transform:uppercase;
  }

  /* ── CHARTS BAND ── */
  .charts-band {
    display:grid;
    grid-template-columns:1fr 1fr;
    border-bottom:1px solid var(--border);
  }

  .chart-pane {
    padding:24px 36px 20px;
    border-right:1px solid var(--border);
  }

  .chart-pane:last-child { border-right:none; }

  .chart-title {
    font-family:'DM Mono',monospace;
    font-size:9px; letter-spacing:0.2em;
    color:var(--muted); text-transform:uppercase;
    margin-bottom:14px;
  }

  .chart-legend {
    display:flex; flex-wrap:wrap; gap:10px;
    margin-top:12px; padding-top:12px;
    border-top:1px solid var(--border);
  }

  .legend-item {
    display:flex; align-items:center; gap:6px;
    font-family:'DM Mono',monospace;
    font-size:9px; color:var(--text-dim);
  }

  .legend-dot {
    width:9px; height:9px;
    border-radius:2px; flex-shrink:0;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display:grid;
    grid-template-columns:260px 1fr;
    min-height:calc(100vh - 400px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right:1px solid var(--border);
    padding:36px 0;
    position:sticky; top:53px;
    height:fit-content;
  }

  .sidebar-title {
    font-family:'DM Mono',monospace;
    font-size:9px; letter-spacing:0.25em;
    color:var(--muted); text-transform:uppercase;
    padding:0 28px 18px;
  }

  .nav-item {
    display:flex; align-items:center; gap:12px;
    padding:11px 28px; cursor:pointer;
    transition:all 0.2s ease;
    border-left:2px solid transparent;
  }

  .nav-item:hover { background:var(--accent-glow); border-left-color:var(--accent); }
  .nav-item.active { border-left-color:var(--accent); background:var(--accent-glow); }
  .nav-item.active .nav-label { color:var(--accent); }

  .nav-item.sierra-nav:hover { background:var(--sierra-glow); border-left-color:var(--sierra-accent); }
  .nav-item.sierra-nav.active { border-left-color:var(--sierra-accent); background:var(--sierra-glow); }
  .nav-item.sierra-nav.active .nav-label { color:var(--sierra-accent); }

  .nav-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .nav-label { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-dim); transition:color 0.2s; }
  .nav-count {
    margin-left:auto;
    font-family:'DM Mono',monospace; font-size:10px;
    color:var(--muted); background:var(--panel);
    border:1px solid var(--border);
    padding:2px 7px; border-radius:20px;
  }

  /* ── CONTENT ── */
  .content { padding:40px 52px; }

  .section { display:none; }
  .section.visible { display:block; animation:fadeIn 0.25s ease; }

  .section-header {
    display:flex; align-items:baseline; gap:16px;
    margin-bottom:32px; padding-bottom:18px;
    border-bottom:1px solid var(--border);
  }

  .section-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:34px; color:var(--white); letter-spacing:0.05em;
  }

  .section-subtitle {
    font-family:'DM Mono',monospace;
    font-size:11px; color:var(--text-dim); letter-spacing:0.15em;
  }

  /* ── CARDS ── */
  .cards-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px; margin-bottom:28px;
  }

  .card {
    background:var(--panel); border:1px solid var(--border);
    border-radius:2px; padding:22px;
    transition:all 0.25s ease;
    position:relative; overflow:hidden;
  }

  .card::before {
    content:''; position:absolute;
    top:0; left:0; width:3px; height:100%;
  }

  .card:hover {
    border-color:var(--accent);
    transform:translateY(-2px);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
  }

  .card-date { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.15em; color:var(--muted); margin-bottom:8px; text-transform:uppercase; }
  .card-title { font-size:14px; font-weight:500; color:var(--white); margin-bottom:6px; line-height:1.4; }
  .card-shop { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:12px; }
  .card-odo {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'DM Mono',monospace; font-size:11px;
    color:var(--accent); background:var(--accent-dim);
    padding:4px 10px; border-radius:2px; margin-top:10px;
  }
  .card-odo::before { content:'◈'; font-size:8px; }
  .card-odo.sierra { color:var(--sierra-accent); background:var(--sierra-dim); }

  .card.routine::before { background:#5b9bd5; }
  .card.engine::before { background:#e08c55; }
  .card.brake::before { background:#5dba7d; }
  .card.cooling::before { background:#c86e9a; }
  .card.electrical::before { background:#e0d055; }
  .card.major::before { background:var(--red); }
  .card.transmission::before { background:#a78bfa; }
  .card.fuel::before { background:#fb923c; }

  /* ── ALERT ── */
  .alert-card {
    background:rgba(224,85,85,0.05);
    border:1px solid rgba(224,85,85,0.25);
    border-radius:2px; padding:18px 22px;
    margin-bottom:14px;
    display:flex; align-items:flex-start; gap:14px;
  }

  .alert-icon { font-size:17px; flex-shrink:0; margin-top:2px; }
  .alert-text h4 { font-size:13px; font-weight:500; color:var(--red); margin-bottom:4px; }
  .alert-text p { font-size:12px; color:var(--text-dim); line-height:1.6; }

  /* ── TIMELINE ── */
  .timeline { position:relative; padding-left:30px; }

  .timeline::before {
    content:''; position:absolute;
    left:6px; top:0; bottom:0; width:1px;
    background:linear-gradient(180deg,var(--accent) 0%,var(--border) 40%);
  }

  .timeline.sierra-tl::before {
    background:linear-gradient(180deg,var(--sierra-accent) 0%,var(--border) 40%);
  }

  .timeline-item {
    position:relative; margin-bottom:24px;
    animation:fadeLeft 0.4s ease forwards; opacity:0;
  }

  .timeline-item:nth-child(1){animation-delay:0.04s}
  .timeline-item:nth-child(2){animation-delay:0.08s}
  .timeline-item:nth-child(3){animation-delay:0.12s}
  .timeline-item:nth-child(4){animation-delay:0.16s}
  .timeline-item:nth-child(5){animation-delay:0.20s}
  .timeline-item:nth-child(6){animation-delay:0.24s}
  .timeline-item:nth-child(7){animation-delay:0.28s}
  .timeline-item:nth-child(8){animation-delay:0.32s}
  .timeline-item:nth-child(9){animation-delay:0.36s}
  .timeline-item:nth-child(10){animation-delay:0.40s}

  .timeline-dot {
    position:absolute; left:-26px; top:4px;
    width:13px; height:13px; border-radius:50%;
    border:2px solid var(--black);
    background:var(--accent);
    box-shadow:0 0 0 3px var(--accent-dim);
  }

  .timeline-dot.sierra { background:var(--sierra-accent); box-shadow:0 0 0 3px var(--sierra-dim); }
  .timeline-dot.major { width:15px;height:15px;left:-27px; box-shadow:0 0 0 4px var(--accent-dim),0 0 12px rgba(200,169,110,0.3); }
  .timeline-dot.minor { background:var(--panel); border-color:var(--border); box-shadow:none; width:10px;height:10px;left:-24px; }

  .tl-date { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; margin-bottom:5px; }
  .tl-date.sierra { color:var(--sierra-accent); }
  .tl-title { font-size:14px; font-weight:500; color:var(--white); margin-bottom:3px; }
  .tl-meta { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); }
  .tl-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }

  /* Search highlight pulse on timeline item */
  .timeline-item.search-hit {
    border-left: 2px solid var(--accent);
    padding-left: 10px;
    margin-left: -12px;
    border-radius: 2px;
    animation: searchPulse 2s ease forwards;
  }
  .timeline-item.search-hit.sierra-hit {
    border-left-color: var(--sierra-accent);
    animation: searchPulseSierra 2s ease forwards;
  }
  @keyframes searchPulse {
    0%   { background: rgba(200,169,110,0.18); }
    60%  { background: rgba(200,169,110,0.10); }
    100% { background: transparent; }
  }
  @keyframes searchPulseSierra {
    0%   { background: rgba(91,155,213,0.18); }
    60%  { background: rgba(91,155,213,0.10); }
    100% { background: transparent; }
  }

  .tag {
    font-family:'DM Mono',monospace; font-size:9px;
    letter-spacing:0.1em; text-transform:uppercase;
    padding:3px 7px; border-radius:2px; border:1px solid;
  }

  .tag-engine { color:#e08c55; border-color:rgba(224,140,85,0.3); background:rgba(224,140,85,0.07); }
  .tag-brake { color:#5dba7d; border-color:rgba(93,186,125,0.3); background:rgba(93,186,125,0.07); }
  .tag-routine { color:#5b9bd5; border-color:rgba(91,155,213,0.3); background:rgba(91,155,213,0.07); }
  .tag-cooling { color:#c86e9a; border-color:rgba(200,110,154,0.3); background:rgba(200,110,154,0.07); }
  .tag-electrical { color:#e0d055; border-color:rgba(224,208,85,0.3); background:rgba(224,208,85,0.07); }
  .tag-major { color:var(--red); border-color:rgba(224,85,85,0.3); background:rgba(224,85,85,0.07); }
  .tag-turbo { color:var(--accent); border-color:rgba(200,169,110,0.3); background:rgba(200,169,110,0.07); }
  .tag-transmission { color:#a78bfa; border-color:rgba(167,139,250,0.3); background:rgba(167,139,250,0.07); }
  .tag-fuel { color:#fb923c; border-color:rgba(251,146,60,0.3); background:rgba(251,146,60,0.07); }
  .tag-tires { color:#8b8b8b; border-color:rgba(139,139,139,0.3); background:rgba(139,139,139,0.07); }

  /* dot colors */
  .dot-routine { background:#5b9bd5; }
  .dot-engine { background:#e08c55; }
  .dot-brake { background:#5dba7d; }
  .dot-cooling { background:#c86e9a; }
  .dot-electrical { background:#e0d055; }
  .dot-major { background:var(--red); }
  .dot-turbo { background:var(--accent); }
  .dot-transmission { background:#a78bfa; }
  .dot-fuel { background:#fb923c; }

  /* mileage bars */
  .mileage-section { margin-bottom:36px; }
  .mile-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; color:var(--text-dim); text-transform:uppercase; margin-bottom:20px; }
  .mile-track { position:relative; height:4px; background:var(--border); border-radius:2px; margin-bottom:8px; }
  .mile-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,#5b9bd5,var(--accent)); }
  .mile-fill.sierra { background:linear-gradient(90deg,#2563a8,var(--sierra-accent)); }
  .ownership-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid var(--border);
    padding:9px 14px; border-radius:2px; margin-top:16px;
    font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim);
  }
  .ownership-badge span { color:var(--accent); }
  .ownership-badge span.sierra { color:var(--sierra-accent); }

  /* shop table */
  .shop-table { width:100%; border-collapse:collapse; }
  .shop-table th { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; text-align:left; padding:10px 14px; border-bottom:1px solid var(--border); }
  .shop-table td { font-size:13px; padding:13px 14px; border-bottom:1px solid rgba(36,36,36,0.5); vertical-align:top; }
  .shop-table tr:last-child td { border-bottom:none; }
  .shop-table tr:hover td { background:var(--accent-glow); }
  .shop-name { font-weight:500; color:var(--white); font-size:13px; }
  .shop-visits { font-family:'DM Mono',monospace; font-size:20px; color:var(--accent); }
  .shop-visits.sierra { color:var(--sierra-accent); }
  .shop-era { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes fadeLeft { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

  /* ── SEARCH ── */
  .search-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-left: 1px solid var(--border);
  }
  .search-input-wrap { position: relative; display: flex; align-items: center; }
  .search-icon { position:absolute; left:10px; color:var(--muted); font-size:13px; pointer-events:none; }
  #search-input {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 28px 7px 30px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    width: 210px;
    outline: none;
    transition: border-color 0.2s, width 0.3s ease;
  }
  #search-input::placeholder { color: var(--muted); }
  #search-input:focus { border-color: var(--accent); width: 270px; }
  .search-clear {
    position: absolute; right: 8px;
    cursor: pointer; color: var(--muted);
    font-size: 15px; display: none; line-height: 1;
    transition: color 0.2s;
  }
  .search-clear:hover { color: var(--text); }

  /* Search results panel */
  #search-results {
    display: none;
    position: absolute;
    top: 53px; left: 0; right: 0;
    background: var(--dark);
    border-bottom: 2px solid var(--border);
    z-index: 98;
    max-height: 72vh;
    overflow-y: auto;
    animation: fadeIn 0.15s ease;
  }
  .sr-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--muted); text-transform: uppercase;
    position: sticky; top: 0; background: var(--dark); z-index: 1;
  }
  .sr-count { color: var(--accent); }
  .sr-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 13px 32px;
    border-bottom: 1px solid rgba(36,36,36,0.6);
    cursor: pointer;
    transition: background 0.12s;
  }
  .sr-item:hover { background: var(--panel); }
  .sr-item:last-child { border-bottom: none; }
  .sr-badge {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; border: 1px solid;
    flex-shrink: 0; margin-top: 2px; white-space: nowrap;
  }
  .sr-badge.cayman { color:var(--accent); border-color:rgba(200,169,110,0.35); background:var(--accent-dim); }
  .sr-badge.sierra { color:var(--sierra-accent); border-color:rgba(91,155,213,0.35); background:var(--sierra-dim); }
  .sr-body { flex: 1; min-width: 0; }
  .sr-title { font-size: 13px; font-weight: 500; color: var(--white); margin-bottom: 3px; line-height: 1.4; }

};

const DOT_COLORS = {
  'dot-routine':      '#5b9bd5',
  'dot-engine':       '#e08c55',
  'dot-brake':        '#5dba7d',
  'dot-cooling':      '#c86e9a',
  'dot-electrical':   '#e0d055',
  'dot-major':        '#e05555',
  'dot-turbo':        '#c8a96e',
  'dot-transmission': '#a78bfa',
  'dot-fuel':         '#fb923c',
  'grey':             '#8b8b8b',
  'purple':           '#7b68b5',
  'accent':           '#c8a96e',
  'sierra-accent':    '#5b9bd5',
};

// ── RENDER HELPERS ────────────────────────────────────────────
function tagHtml(tags) {
  return tags.map(t => {
    const s = TAG_STYLES[t] || TAG_STYLES.routine;
    return `<span class="tag ${s.cls}">${s.label}</span>`;
  }).join('');
}

function timelineItemHtml(item, vehicle) {
  const dotClass = item.dot === 'sierra' ? 'timeline-dot sierra'
    : item.dot === 'major' ? 'timeline-dot major'
    : item.dot === 'minor' ? 'timeline-dot minor'
    : 'timeline-dot';
  const dateClass = vehicle === 'sierra' ? 'tl-date sierra' : 'tl-date';
  return `
    <div class="timeline-item">
      <div class="${dotClass}"></div>
      <div class="${dateClass}">${item.date}</div>
      <div class="tl-title">${item.title}</div>
      <div class="tl-meta">${item.shop}</div>
      <div class="tl-tags">${tagHtml(item.tags)}</div>
    </div>`;
}

function shopsTableHtml(shops, vehicle) {
  const rows = shops.map(s => `
    <tr>
      <td><div class="shop-name">${s.name}</div></td>
      <td><div class="shop-visits${vehicle==='sierra'?' sierra':''}">${s.visits}</div></td>
      <td><div class="shop-era">${s.period}</div></td>
      <td style="font-size:12px;color:var(--text-dim);">${s.notes}</td>
    </tr>`).join('');
  return `<table class="shop-table">
    <thead><tr><th>Shop</th><th>Visits</th><th>Period</th><th>Notes</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function mileageBarHtml(v) {
  const d = GARAGE[v];
  const bars = d.mileageProgress.map(b => `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:72px;">${b.label}</span>
      <div class="mile-track" style="flex:1;"><div class="mile-fill${v==='sierra'?' sierra':''}" style="width:${b.width}"></div></div>
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:${b.accent?'var(--'+(v==='sierra'?'sierra-':'')+'accent)':'var(--text-dim)'};width:58px;text-align:right;">${b.value}</span>
    </div>`).join('');
  const badgeSpan = v === 'sierra' ? '<span class="sierra">◈</span>' : '<span>◈</span>';
  return `
    <div class="mileage-section" style="margin-top:28px;">
      <div class="mile-label">Mileage Progression</div>
      ${bars}
      <div class="ownership-badge">${badgeSpan} ${d.ownershipNote}</div>
    </div>`;
}

function alertHtml(alert, v) {
  if (!alert) return '';
  const isSierra = v === 'sierra';
  const isInfo = alert.style === 'info' || alert.style === 'info-sierra';
  const bk = isInfo
    ? (isSierra ? 'rgba(91,155,213,0.05)' : 'rgba(200,110,154,0.05)')
    : 'rgba(224,85,85,0.05)';
  const bd = isInfo
    ? (isSierra ? 'rgba(91,155,213,0.25)' : 'rgba(200,110,154,0.25)')
    : 'rgba(224,85,85,0.25)';
  const tc = isInfo
    ? (isSierra ? 'var(--sierra-accent)' : '#c86e9a')
    : 'var(--red)';
  return `
    <div class="alert-card" style="background:${bk};border-color:${bd};">
      <div class="alert-icon">${alert.icon}</div>
      <div class="alert-text">
        <h4 style="color:${tc};">${alert.title}</h4>
        <p>${alert.body}</p>
      </div>
    </div>`;
}

// ── BUILD SECTION CONTENT ─────────────────────────────────────
// Each vehicle has sections that share the same .section[id] structure.
// Only the overview and timeline are universal; the rest are vehicle-specific.
// We render a generic "section" for anything not explicitly handled.

function buildSections(v) {
  const d = GARAGE[v];
  const isSierra = v === 'sierra';
  const accentVar = isSierra ? 'var(--sierra-accent)' : 'var(--accent)';
  let html = '';

  // Build all sections declared in navSections
  d.navSections.forEach((nav, idx) => {
    const sid = `${v}-${nav.id}`;
    const isFirst = idx === 0;
    html += `<div id="${sid}" class="section${isFirst?' visible':''}">`;

    // ── OVERVIEW ──
    if (nav.id === 'overview') {
      html += `
        <div class="section-header">
          <h2 class="section-title">Overview</h2>
          <span class="section-subtitle">${d.meta.firstService} – ${d.meta.latestService} · ${d.meta.odometer}</span>
        </div>
        ${alertHtml(d.alerts?.overview, v)}
        ${mileageBarHtml(v)}`;
      // Overview cards: first 4 timeline items that are not minor
      const featured = d.timeline.filter(t => t.dot !== 'minor').slice(0,4);
      if (featured.length) {
        html += '<div class="cards-grid" style="margin-top:28px;">';
        featured.forEach(item => {
          const cardType = item.tags[0] || 'routine';
          const odoClass = isSierra ? 'card-odo sierra' : 'card-odo';
          const odo = item.date.includes('·') ? item.date.split('·')[1].trim() : '';
          html += `
            <div class="card ${cardType}">
              <div class="card-date">${item.date}</div>
              <div class="card-title">${item.title}</div>
              <div class="card-shop">${item.shop}</div>
              ${odo ? `<div class="${odoClass}">${odo}</div>` : ''}
            </div>`;
        });
        html += '</div>';
      }
    }

    // ── TIMELINE ──
    else if (nav.id === 'timeline') {
      html += `
        <div class="section-header">
          <h2 class="section-title">Full Timeline</h2>
          <span class="section-subtitle">Chronological · All Services</span>
        </div>
        <div class="timeline${isSierra?' sierra-tl':''}">
          ${d.timeline.map(item => timelineItemHtml(item, v)).join('')}
        </div>`;
    }

    // ── SHOPS ──
    else if (nav.id === 'shops') {
      html += `
        <div class="section-header">
          <h2 class="section-title">Service Shops</h2>
          <span class="section-subtitle">Where The Work Was Done</span>
        </div>
        ${shopsTableHtml(d.shops, v)}`;
    }

    // ── GENERIC SECTION (engine, brakes, transmission, etc.) ──
    else {
      // Filter timeline items relevant to this section by matching tag keys
      // The nav id is used as the tag filter key
      const tagMap = {
        engine:      ['engine'],
        brakes:      ['brake'],
        cooling:     ['cooling'],
        turbo:       ['turbo','major'],
        electrical:  ['electrical'],
        tires:       ['tires'],
        transmission:['transmission'],
        fuel:        ['fuel'],
      };
      const filterTags = tagMap[nav.id] || [nav.id];
      const items = d.timeline.filter(t =>
        t.tags.some(tag => filterTags.includes(tag))
      );

      const alertKey = nav.id;
      html += `
        <div class="section-header">
          <h2 class="section-title">${nav.label}</h2>
          <span class="section-subtitle">${nav.count ? nav.count + ' Records' : ''}</span>
        </div>
        ${d.alerts?.[alertKey] ? alertHtml(d.alerts[alertKey], v) : ''}
        <div class="cards-grid">`;

      items.forEach(item => {
        const cardType = item.tags[0] || 'routine';
        const odoClass = isSierra ? 'card-odo sierra' : 'card-odo';
        const odo = item.date.includes('·') ? item.date.split('·')[1].trim() : '';
        html += `
          <div class="card ${cardType}">
            <div class="card-date">${item.date}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-shop">${item.shop}</div>
            ${odo ? `<div class="${odoClass}">${odo}</div>` : ''}
          </div>`;
      });

      html += '</div>';
    }

    html += '</div>'; // close .section
  });
  return html;
}

// ── BUILD VEHICLE PANEL HTML ──────────────────────────────────
function buildPanel(v) {
  const d = GARAGE[v];
  const isSierra = v === 'sierra';
  const accentVar = isSierra ? 'var(--sierra-accent)' : 'var(--accent)';

  // Stats bar
  const statsHtml = d.stats.map(s => `
    <div class="stat${isSierra?' sierra':''}">
      <div class="stat-number${isSierra?' sierra':''}">${s.number}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');

  // Chart legend
  const legendHtml = d.serviceChart.legend.map((lbl, i) => {
    const col = d.serviceChart.datasets.find(ds => ds.label === lbl)?.color || '#888';
    return `<div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${lbl}</div>`;
  }).join('');

  // Nav sidebar
  const navHtml = d.navSections.map((nav, idx) => {
    const dotColor = DOT_COLORS[nav.dot] || '#888';
    const isFirst = idx === 0;
    return `
      <div class="nav-item${isSierra?' sierra-nav':''} ${isFirst?'active':''}"
           onclick="showSection('${v}','${nav.id}',this)">
        <span class="nav-dot" style="background:${dotColor}"></span>
        <span class="nav-label">${nav.label}</span>
        ${nav.count ? `<span class="nav-count">${nav.count}</span>` : ''}
      </div>`;
  }).join('');

  return `
<div class="vehicle-panel${v==='cayman'?' active':''}" id="panel-${v}">
  <header${isSierra?' class="sierra-header"':''}>
    <div class="header-eyebrow${isSierra?' sierra':''}">${d.meta.eyebrow}</div>
    <h1>${d.meta.make} <span class="${isSierra?'sierra':'cayman'}-accent">${d.meta.model}</span><br>${d.meta.subtitle}</h1>
    <div class="header-meta">
      <div class="meta-item"><span class="meta-label">First Service</span><span class="meta-value">${d.meta.firstService}</span></div>
      <div class="meta-item"><span class="meta-label">Latest Service</span><span class="meta-value">${d.meta.latestService}</span></div>
      <div class="meta-item"><span class="meta-label">Current Odometer</span><span class="meta-value">${d.meta.odometer}</span></div>
      <div class="meta-item"><span class="meta-label">Color</span><span class="meta-value">${d.meta.color}</span></div>
      <div class="meta-item"><span class="meta-label">Ownership Since</span><span class="meta-value">${d.meta.ownedSince}</span></div>
    </div>
  </header>

  <div class="stats-bar">${statsHtml}</div>

  <div class="charts-band">
    <div class="chart-pane">
      <div class="chart-title">Service Events by Type — Timeline</div>
      <canvas id="${v}-serviceChart" height="95"></canvas>
      <div class="chart-legend">${legendHtml}</div>
    </div>
    <div class="chart-pane">
      <div class="chart-title">Estimated Miles Driven Per Year</div>
      <canvas id="${v}-milesChart" height="95"></canvas>
    </div>
  </div>

  <div class="main">
    <nav class="sidebar">
      <div class="sidebar-title">Sections</div>
      ${navHtml}
    </nav>
    <div class="content">
      ${buildSections(v)}
    </div>
  </div>
</div>`;
}

// ── BUILD TABS ────────────────────────────────────────────────
function buildTabs() {
  const tabsEl = document.getElementById('vehicle-tabs');
  Object.keys(GARAGE).forEach(v => {
    const d = GARAGE[v];
    const isFirst = v === 'cayman';
    const div = document.createElement('div');
    div.className = `vtab${isFirst?' active-'+v:''}`;
    div.id = `tab-${v}`;
    div.setAttribute('onclick', `switchVehicle('${v}')`);
    div.innerHTML = `<span>${d.meta.model}</span><span class="vtab-badge vtab-badge-${v}">${d.meta.make}</span>`;
    tabsEl.insertBefore(div, tabsEl.querySelector('.search-wrap'));
  });
}

// ── RENDER EVERYTHING ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildTabs();
  const container = document.getElementById('panels-container');
  Object.keys(GARAGE).forEach(v => {
    container.innerHTML += buildPanel(v);
  });
  // Init charts for the default visible panel
  initCharts('cayman');
  chartsInitialized['cayman'] = true;
});

// ── TAB SWITCHING ────────────────────────────────────────────
let chartsInitialized = {};

function switchVehicle(v) {
  document.querySelectorAll('.vehicle-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.vtab').forEach(t => {
    t.className = 'vtab';
  });
  document.getElementById('panel-' + v).classList.add('active');
  document.getElementById('tab-' + v).classList.add('active-' + v);
  if (!chartsInitialized[v]) { initCharts(v); chartsInitialized[v] = true; }
}

// ── SECTION SWITCHING ────────────────────────────────────────
function showSection(vehicle, id, el) {
  const panel = document.getElementById('panel-' + vehicle);
  panel.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  panel.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(vehicle + '-' + id).classList.add('visible');
  el.classList.add('active');
}

// ── CHART DEFAULTS ───────────────────────────────────────────
Chart.defaults.color = '#888';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;
const gridColor = 'rgba(255,255,255,0.05)';
const borderColor = 'rgba(255,255,255,0.08)';
const tooltipDefaults = {
  backgroundColor: '#161616',
  borderColor: '#242424',
  borderWidth: 1,
  titleColor: '#c8a96e',
  bodyColor: '#d8d0c4',
  padding: 10
};

function makeScales(stacked) {
  return {
    x: { stacked, grid:{color:gridColor}, border:{color:borderColor}, ticks:{color:'#888',font:{size:10}} },
    y: { stacked, grid:{color:gridColor}, border:{color:borderColor}, ticks:{color:'#888',font:{size:10},stepSize:1,callback:v=>v===0?'':v}, min:0 }
  };
}
function makeMilesScales() {
  return {
    x: { grid:{color:gridColor}, border:{color:borderColor}, ticks:{color:'#888',font:{size:10}} },
    y: { grid:{color:gridColor}, border:{color:borderColor}, ticks:{color:'#888',font:{size:10},callback:v=>v===0?'':(v/1000).toFixed(0)+'k'}, min:0 }
  };
}

// ── INIT CHARTS FROM DATA ─────────────────────────────────────
function initCharts(v) {
  const d = GARAGE[v];
  const isSierra = v === 'sierra';

  // Service type stacked bar
  new Chart(document.getElementById(v + '-serviceChart'), {
    type: 'bar',
    data: {
      labels: d.serviceChart.labels,
      datasets: d.serviceChart.datasets.map(ds => ({
        label: ds.label,
        backgroundColor: ds.color,
        data: ds.data,
      }))
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          ...tooltipDefaults,
          titleColor: isSierra ? '#5b9bd5' : '#c8a96e',
          callbacks: {
            title: ctx => 'Year: ' + ctx[0].label,
            label: ctx => ' ' + ctx.dataset.label + ': ' + ctx.raw,
          }
        }
      },
      scales: makeScales(true)
    }
  });

  // Miles per year bar
  const mpy = d.milesPerYear;
  const avg = Math.round(mpy.data.slice(0, mpy.partialYearIndex).reduce((s,n)=>s+n,0) / mpy.partialYearIndex);
  const accentFull  = isSierra ? '#5b9bd5' : '#c8a96e';
  const accentFaded = isSierra ? 'rgba(91,155,213,0.35)' : 'rgba(200,169,110,0.35)';
  const lineColor   = isSierra ? 'rgba(200,169,110,0.5)'  : 'rgba(91,155,213,0.5)';

  new Chart(document.getElementById(v + '-milesChart'), {
    type: 'bar',
    data: {
      labels: mpy.labels,
      datasets: [
        {
          label: 'Miles',
          data: mpy.data,
          backgroundColor: mpy.data.map((m, i) =>
            i === mpy.partialYearIndex ? accentFaded : m > avg ? accentFull : '#2e2e2e'
          ),
          borderColor: mpy.data.map((_, i) => i === mpy.partialYearIndex ? accentFull : 'transparent'),
          borderWidth: 1,
        },
        {
          label: 'Average',
          type: 'line',
          data: mpy.data.map(() => avg),
          borderColor: lineColor,
          borderWidth: 1,
          borderDash: [4, 3],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          ...tooltipDefaults,
          titleColor: isSierra ? '#5b9bd5' : '#c8a96e',
          callbacks: {
            title: ctx => ctx[0].label + (ctx[0].dataIndex === mpy.partialYearIndex ? ' (partial)' : ''),
            label: ctx => ctx.dataset.label === 'Average'
              ? ' Avg: ' + avg.toLocaleString() + ' mi/yr'
              : ' Miles: ' + ctx.raw.toLocaleString()
          }
        }
      },
      scales: makeMilesScales()
    }
  });
}

// ── SEARCH ────────────────────────────────────────────────────
// Build flat search index from GARAGE data
function buildSearchIndex() {
  const index = [];
  Object.keys(GARAGE).forEach(v => {
    const d = GARAGE[v];
    d.timeline.forEach(item => {
      const odo = item.date.includes('·') ? item.date.split('·')[1].trim() : '';
      const date = item.date.split('·')[0].trim();
      index.push({
        vehicle: v,
        label: d.meta.make + ' ' + d.meta.model,
        date, odo,
        shop: item.shop,
        title: item.title,
        tags: item.tags.map(t => TAG_STYLES[t]?.label || t),
      });
    });
  });
  return index;
}

const TAG_COLORS_SEARCH = Object.fromEntries(
  Object.entries(TAG_STYLES).map(([k, v]) => [v.label, v.color])
);

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function onSearch(val) {
  const q = val.trim().toLowerCase();
  const resultsEl = document.getElementById('search-results');
  const clearBtn  = document.getElementById('search-clear');
  const listEl    = document.getElementById('sr-list');
  const countEl   = document.getElementById('sr-count');

  clearBtn.style.display = q ? 'block' : 'none';
  if (!q) { resultsEl.style.display = 'none'; return; }

  const index = buildSearchIndex();
  const matches = index.filter(r =>
    r.title.toLowerCase().includes(q) ||
    r.shop.toLowerCase().includes(q) ||
    r.date.toLowerCase().includes(q) ||
    r.tags.some(t => t.toLowerCase().includes(q)) ||
    r.label.toLowerCase().includes(q) ||
    r.odo.toLowerCase().includes(q)
  );

  countEl.textContent = matches.length + ' result' + (matches.length !== 1 ? 's' : '');

  if (matches.length === 0) {
    listEl.innerHTML = `<div class="sr-empty">No records found for "${val}"</div>`;
  } else {
    listEl.innerHTML = matches.map(r => {
      const tagHtml = r.tags.map(t => {
        const col = TAG_COLORS_SEARCH[t] || '#888';
        return `<span class="tag" style="color:${col};border-color:${col}33;background:${col}12">${t}</span>`;
      }).join('');
      const meta = [r.date, r.odo, r.shop].filter(Boolean).join(' · ');
      const safeTitle = r.title.replace(/'/g, "\\'");
      const safeVehicle = r.vehicle;
      return `<div class="sr-item" onclick="goToRecord('${safeVehicle}', '${safeTitle}')">
        <span class="sr-badge ${r.vehicle}">${r.label}</span>
        <div class="sr-body">
          <div class="sr-title">${highlight(r.title, val)}</div>
          <div class="sr-meta">${highlight(meta, val)}</div>
          <div class="sr-tags" style="margin-top:5px">${tagHtml}</div>
        </div>
      </div>`;
    }).join('');
  }
  resultsEl.style.display = 'block';
}

function goToRecord(vehicle, title) {
  clearSearch();
  switchVehicle(vehicle);
  const panel = document.getElementById('panel-' + vehicle);
  panel.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  panel.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(vehicle + '-timeline').classList.add('visible');
  panel.querySelectorAll('.nav-item')[1].classList.add('active');

  const timelineItems = panel.querySelectorAll('#' + vehicle + '-timeline .timeline-item');
  let targetEl = null;
  timelineItems.forEach(item => {
    const titleEl = item.querySelector('.tl-title');
    if (titleEl && titleEl.textContent.trim() === title.trim()) targetEl = item;
  });
  if (!targetEl) return;

  panel.querySelectorAll('.timeline-item.search-hit').forEach(el => {
    el.classList.remove('search-hit', 'sierra-hit');
  });
  targetEl.classList.add('search-hit');
  if (vehicle === 'sierra') targetEl.classList.add('sierra-hit');

  setTimeout(() => { targetEl.scrollIntoView({ behavior:'smooth', block:'center' }); }, 80);
  setTimeout(() => { targetEl.classList.remove('search-hit', 'sierra-hit'); }, 2200);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-clear').style.display = 'none';
}

document.addEventListener('click', e => {
  const sr = document.getElementById('search-results');
  const inp = document.getElementById('search-input');
  if (sr && !sr.contains(e.target) && e.target !== inp) sr.style.display = 'none';
});

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('search-input').addEventListener('focus', () => {
    if (document.getElementById('search-input').value.trim()) {
      document.getElementById('search-results').style.display = 'block';
    }
  });
});
</script>
</body>
